<style>
*{box-sizing:border-box;margin:0;padding:0}

.memtag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 7px;background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.2);border-radius:8px;color:#34d399;margin-top:5px}
.typing{display:flex;align-items:center;gap:4px;padding:2px 0}

.inputrow{display:flex;gap:7px;align-items:flex-end}
textarea{flex:1;background:#0a0f1a;border:1px solid #1e293b;border-radius:8px;padding:9px 12px;color:#f8fafc;font-family:Consolas,Monaco,monospace;font-size:13px;resize:none;outline:none;line-height:1.5;max-height:110px;transition:border-color .2s}

.sendbtn{background:#f59e0b;color:#020617;border:none;padding:9px 16px;border-radius:8px;font-weight:900;cursor:pointer;font-size:13px;font-family:inherit;letter-spacing:1px;transition:all .2s;white-space:nowrap;flex-shrink:0}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:15px}
.setbox{background:#0f172a;border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:16px;width:100%;max-width:400px;max-height:90dvh;overflow-y:auto}
.settitle{font-size:12px;color:#f59e0b;font-weight:700;letter-spacing:2px;margin-bottom:10px;border-bottom:1px solid rgba(245,158,11,0.15);padding-bottom:3px}
.setrow{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.setname{font-size:11px;color:#64748b;width:75px;flex-shrink:0}
.setinput{flex:1;background:rgba(255,255,255,0.04);border:1px solid #1e293b;border-radius:5px;padding:5px 8px;color:#f8fafc;font-size:11px;font-family:Consolas,monospace;outline:none}
.setinput:focus{border-color:#f59e0b}
.setdel{background:none;border:1px solid rgba(239,68,68,0.4);color:#ef4444;padding:2px 6px;border-radius:4px;cursor:pointer;font-size:10px;font-family:inherit}
.addbox{background:rgba(255,255,255,0.02);border:1px dashed #334155;border-radius:8px;padding:10px;margin-top:10px;margin-bottom:12px}
.addbtn{width:100%;padding:6px;background:#38bdf8;color:#020617;border:none;border-radius:5px;cursor:pointer;font-weight:700;font-size:11px;font-family:inherit;margin-top:6px}
.setmempanel{background:rgba(255,255,255,0.02);border:1px solid #1e293b;border-radius:6px;padding:8px;margin-bottom:12px}
.setmemlist{max-height:100px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-top:5px}
.memitem{font-size:11px;color:#94a3b8;line-height:1.4;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.memclear{background:none;border:none;color:#ef4444;font-size:10px;cursor:pointer;font-family:inherit;font-weight:700}
.setclose{width:100%;padding:9px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:#f59e0b;border-radius:7px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:700}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,0.9);color:#020617;padding:5px 16px;border-radius:16px;font-size:11px;z-index:300;font-weight:700;white-space:nowrap}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const ROLES=[
  {id:'fault',icon:'⚡',name:'故障诊断',prompt:'核心任务：工控故障诊断。输出：①最可能原因（按概率降序）②具体排查步骤③寄存器/参数地址。禁止废话，直击要害。'},
  {id:'plc',icon:'💻',name:'PLC编程',prompt:'核心任务：PLC编程。直接给出能粘贴使用的代码，注明平台（博途SCL/三菱ST/欧姆龙ST），必须有中文注释。'},
  {id:'robot',icon:'🦾',name:'机器人',prompt:'核心任务：工业机器人（FANUC/安川/川崎/ABB/KUKA）。给出具体操作路径、菜单名称、参数值，不给模糊答案。'},
  {id:'comm',icon:'🔗',name:'通信调试',prompt:'核心任务：工业通信（Profinet/EtherCAT/Modbus）。给出具体配置参数、IP/站号设置、排查步骤。'}
];

const PERSONA_CAT=`你是《工控成神录》AI副驾驶，代号"黑猫特工"。人设：高冷理性、一针见血。核心要求：每次回答必须极其精炼，严禁超过250字，严禁说任何客套废话！`;
const KWS=['西门子','三菱','安川','FANUC','川崎','ABB','KUKA','欧姆龙','Profinet','Modbus','EtherCAT','PLC','变频器','伺服','报警','故障','SCL','博途'];
const extractKW=t=>KWS.filter(k=>t.includes(k));

let savedAis = [];
try {
  const localData = localStorage.getItem('gkcsn_custom_ais');
  if(localData) savedAis = JSON.parse(localData);
} catch(e) { savedAis = []; }

if(!Array.isArray(savedAis) || savedAis.length === 0) {
  savedAis = [
    {name: 'Gemini 2.0', url: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=', key: '', modelName: 'gemini-2.0-flash', type: 'gemini'},
    {name: 'DeepSeek V3', url: 'https://api.deepseek.com/v1/chat/completions', key: '', modelName: 'deepseek-chat', type: 'openai'}
  ];
}

let savedMems = [];
try {
  const localMems = localStorage.getItem('gkcsn_m');
  if(localMems) savedMems = JSON.parse(localMems);
} catch(e) { savedMems = []; }
if(!Array.isArray(savedMems)) savedMems = [];

let S = {
  role: ROLES[0],
  msgs: [],
  loading: false,
  showSet: false,
  toast: '',
  toastTimer: null,
  inp: '',
  activeAiIdx: 0,
  customAis: savedAis,
  mems: savedMems,
  angle: 0,
  currentSpeaker: '' // 当前正在思考的AI别称
};

const saveCustomAis = () => localStorage.setItem('gkcsn_custom_ais', JSON.stringify(S.customAis));
const saveMems = () => localStorage.setItem('gkcsn_m', JSON.stringify(S.mems));
const now2 = () => new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
const nowF = () => new Date().toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});

function toast(msg){
  clearTimeout(S.toastTimer); S.toast=msg; render();
  S.toastTimer=setTimeout(()=>{S.toast=''; render();},2200);
}

async function requestAi(ai, sys, hist, msg) {
  if(!ai.key) throw new Error(`未配置 [${ai.name}] 的 API Key，请在管理面填写！`);
  if(ai.type === 'gemini' || ai.url.includes('generativelanguage.googleapis.com')) {
    const contents = [];
    hist.forEach(m => contents.push({role: m.role==='user'?'user':'model', parts:[{text: m.content}]}));
    contents.push({role:'user', parts:[{text: msg}]});
    let fullUrl = ai.url;
    if(!fullUrl.includes('key=')) fullUrl += (fullUrl.includes('?') ? '&' : '?') + 'key=' + ai.key;
    else if(fullUrl.endsWith('key=')) fullUrl += ai.key;
    const r = await fetch(fullUrl, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        system_instruction: {parts: [{text: sys}]},
        contents,
        generationConfig: {maxOutputTokens: 800, temperature: 0.4}
      })
    });
    if(!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e?.error?.message || 'HTTP ' + r.status); }
    const d = await r.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text || '（无法解析Gemini返回内容）';
  } else {
    const messages = [{role: 'system', content: sys}];
    hist.forEach(m => messages.push({role: m.role==='user'?'user':'assistant', content: m.content}));
    messages.push({role: 'user', content: msg});
    const r = await fetch(ai.url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + ai.key
      },
      body: JSON.stringify({
        model: ai.modelName || 'default',
        messages,
        max_tokens: 800,
        temperature: 0.4
      })
    });
    if(!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e?.error?.message || 'HTTP ' + r.status); }
    const d = await r.json();
    return d.choices?.[0]?.message?.content || '（无法解析OpenAI返回内容）';
  }
}

function buildSys(q){
  let sys = PERSONA_CAT + '\n\n' + S.role.prompt;
  const rel = S.mems.filter(m => extractKW(q).some(k => m.text.includes(k))).slice(0,3);
  if(rel.length > 0) {
    sys += '\n\n【历史经验记忆底账】\n';
    rel.forEach(m => { sys += `• [${m.time}] ${m.text}\n`; });
  }
  return sys;
}

function renderContent(text){
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return text.split(/(```[\s\S]*?```)/g).map(p => {
    if(p.startsWith('```')){
      const lines = p.slice(3,-3).split('\n');
      const lang = lines[0].trim() || 'code';
      const code = lines.slice(1).join('\n');
      return `<div class="codeblock"><div class="codelang"><span>${lang}</span><button class="codecopy" onclick="cpCode(this,'${btoa(unescape(encodeURIComponent(code)))}')">复制</button></div><pre>${esc(code)}</pre></div>`;
    }
    return `<span style="white-space:pre-wrap">${esc(p)}</span>`;
  }).join('');
}

function cpCode(btn, b64){
  try{navigator.clipboard?.writeText(decodeURIComponent(escape(atob(b64)))); btn.textContent='✅'; setTimeout(()=>btn.textContent='复制',1500);}catch(e){}
}

function scrollEnd(){ setTimeout(() => { const m = document.querySelector('main'); if(m) m.scrollTop = m.scrollHeight; }, 50); }

// 【核心圆桌调度引擎】
async function send(){
  const text = S.inp.trim();
  if(!text || S.loading) return;

  // 1. 过滤有 Key 的活跃 AI
  const activeAis = S.customAis.filter(ai => ai.key.length > 0);
  if(activeAis.length === 0) {
    toast('⚠️ 未检测到已配置 Key 的 AI 接口！请前往管理面配置。');
    return;
  }

  S.msgs.push({role: 'user', content: text, ts: now2()});
  S.inp = ''; S.loading = true; 
  const ta = document.getElementById('mInp');
  if(ta) ta.value = '';
  render(); scrollEnd();

  // 2. 建立共享“圆桌资料”缓冲区
  let roundTableLog = `【主诉问题】：${text}\n\n`;
  let finalSolution = "";
  let debateRound = 1;
  const maxRounds = 3; // 设定辩论上限，防止刷爆额度
  let consensusReached = false;

  try {
    // 循环展开辩论，直到所有 AI 达成共识或到最大轮数
    while(debateRound <= maxRounds && !consensusReached) {
      let roundAgreements = 0;

      for(let i=0; i < activeAis.length; i++) {
        const currentAi = activeAis[i];
        S.currentSpeaker = `${currentAi.name} (第${debateRound}轮发言)`;
        render(); scrollEnd();

        // 构造圆桌指令
        let promptForAi = `这里有一份【圆桌共享资料】，请认真审阅：\n${roundTableLog}\n`;
        if (debateRound === 1 && i === 0) {
          promptForAi += `作为首位发言者，请针对该工控场景直接给出初始诊断与解决方案。`;
        } else {
          promptForAi += `请审阅上方其他 AI 的先前意见。如果你完全同意上述方案且无任何补充，必须在开头回复“【完全同意，达成共识】”；如果有不同见解、漏洞补充或优化算法，请直接指出并给出你的修正方案。`;
        }

        const reply = await requestAi(currentAi, buildSys(text), [], promptForAi);
        
        // 判定共识标志
        const isAgree = reply.includes('完全同意') || reply.includes('达成共识');
        if(isAgree) roundAgreements++;

        // 记录到圆桌日志
        roundTableLog += `▶ [${currentAi.name} · 意见]: ${reply}\n\n`;
        
        // 推送到前端 UI 进行辩论实时展示
        S.msgs.push({
          role: 'assistant',
          isDebate: true, // 标记为辩论中间体
          content: reply,
          aiName: `${currentAi.name} [R${debateRound}]`,
          roleName: isAgree ? '🟢 赞同共识' : '⚡ 审议修正',
          ts: now2()
        });
        render(); scrollEnd();
        
        // 保留最后一个不选择放弃的 AI 作为最终输出的基础内容
        if(!isAgree || !finalSolution) {
          finalSolution = reply;
        }
      }

      // 如果本轮所有人都投了赞成票，或者只有一个 AI 参加且完成首轮，提前判定共识达成
      if(roundAgreements === activeAis.length || activeAis.length === 1) {
        consensusReached = true;
      } else {
        debateRound++;
      }
    }

    // 3. 辩论闭环，提炼最终解决方案
    S.currentSpeaker = "正在签署终极共识...";
    render();

    const kw = extractKW(text + finalSolution);
    S.msgs.push({
      role: 'assistant',
      isDebate: false, // 最终结论
      content: `🏆 【圆桌会议达成共识 · 最终执行方案】\n\n经过 ${debateRound - 1} 轮交叉质检辩论，多机联合决议如下：\n\n${finalSolution}`,
      aiName: '圆桌联合会议',
      roleName: '终极方案',
      ts: now2(),
      kw
    });

    // 4. 将博弈结果持久化至工控经验记忆库
    const mem = {
      id: Date.now(),
      time: nowF(),
      text: `[圆桌决议] 问:${text.slice(0,20)}… 结案:${finalSolution.slice(0,50)}…`,
      kw
    };
    S.mems = [mem, ...S.mems].slice(0, 50);
    saveMems();

  } catch(e) {
    S.msgs.push({role: 'error', content: '❌ 圆桌通信中断: ' + e.message, ts: now2()});
  }

  S.loading = false;
  S.currentSpeaker = '';
  render(); scrollEnd();
}

function addNewAi() {
  const name = document.getElementById('new_name')?.value?.trim();
  const url = document.getElementById('new_url')?.value?.trim();
  const key = document.getElementById('new_key')?.value?.trim();
  const mName = document.getElementById('new_mname')?.value?.trim();
  const type = document.getElementById('new_type')?.value;
  if(!name || !url || !key) { alert('请将名称、接口地址和Key填写完整！'); return; }
  S.customAis.push({ name, url, key, modelName: mName, type });
  saveCustomAis();
  toast('✅ 成功加入圆桌席位');
  render();
}

function deleteAi(idx, e) {
  e.stopPropagation();
  if(S.customAis.length <= 1) { alert('请至少保留一个 AI 接口！'); return; }
  S.customAis.splice(idx, 1);
  if(S.activeAiIdx >= S.customAis.length) S.activeAiIdx = 0;
  saveCustomAis();
  render();
}

function updateStage3D() {
  const stage = document.getElementById('dynamicStage3D');
  if(!stage) return;
  let orbitHtml = '';
  const activeCount = S.customAis.length;
  S.customAis.forEach((ai, idx) => {
    const personalAngle = S.angle + (idx * (Math.PI * 2 / activeCount));
    const rx = 85; 
    const ry = 35; 
    const x = Math.cos(personalAngle) * rx;
    const y = Math.sin(personalAngle) * ry;
    
    const sinNorm = Math.sin(personalAngle);
    const scale = 0.72 + (sinNorm + 1) * 0.23; 
    const opacity = ai.key ? (0.5 + (sinNorm + 1) * 0.3) : 0.2; 
    const zIndex = Math.floor((sinNorm + 1) * 10);

    orbitHtml += `<div class="orbit-ai" style="transform: translate3d(${x}px, ${y}px, 0px) scale(${scale}); opacity: ${opacity}; z-index: ${zIndex}; ${ai.key?'border-color:#f59e0b;color:#f8fafc':''}">
      ${ai.key ? '⚡' : '⚪'} ${ai.name}
    </div>`;
  });
  stage.innerHTML = `<div class="wcat" style="text-shadow: 0 0 15px rgba(245,158,11,0.5)">🐱</div>${orbitHtml}`;
}

function render(){
  let msgsHtml = '';
  if(S.msgs.length === 0) {
    msgsHtml = `<div class="welcome">
      <div class="stage3d" id="dynamicStage3D"></div>
      <div class="wtitle">工控成神录 <span>ROUNDTABLE</span></div>
      <div class="wdesc">圆桌就绪：已激活 ${S.customAis.filter(a=>a.key).length} 个分布式AI控制节点</div>
    </div>`;
  } else {
    msgsHtml = S.msgs.map(m => {
      if(m.role === 'user') return `<div class="msgrow u"><div class="bbl u">${m.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}<div class="mtr">${m.ts}</div></div></div>`;
      if(m.role === 'error') return `<div class="msgrow"><div class="av">⚠</div><div class="bbl er">${m.content}</div></div>`;
      
      const kwtags = m.kw?.length > 0 ? `<div class="memtag">🧠 共识记忆驱动 · ${m.kw.slice(0,3).join(' · ')}</div>` : '';
      const bubbleClass = m.isDebate ? 'bbl ai deb' : 'bbl ai';
      const mtagClass = m.isDebate ? 'mtag deb' : 'mtag';

      return `<div class="msgrow"><div class="av">${m.isDebate?'💬':'🏆'}</div><div class="${bubbleClass}">
        <div class="mmeta"><span class="${mtagClass}">${m.aiName}</span><span style="font-size:10px;color:#475569">${m.roleName}</span><span class="mts">${m.ts}</span></div>
        ${renderContent(m.content)}${kwtags}</div></div>`;
    }).join('');
    
    if(S.loading) {
      msgsHtml += `<div class="msgrow"><div class="av">⏳</div><div class="bbl ai" style="border-color:#38bdf8"><div class="typing"><i></i><i></i><i></i><span class="ttxt" style="color:#38bdf8;font-weight:700">圆桌会议席：[${S.currentSpeaker}] 正在切片审查资料...</span></div></div></div>`;
    }
  }

  const setMemHtml = S.mems.length === 0
    ? '<div style="font-size:11px;color:#475569;text-align:center;padding:10px 0">暂无会议纪要 · 辩论收敛后将自动沉淀</div>'
    : S.mems.map(m => `<div class="memitem"><span>[${m.time}]</span> ${m.text}</div>`).join('');

  const setHtml = S.showSet ? `<div class="overlay" id="setOverlay" onclick="if(event.target===this){S.showSet=false;render();}">
    <div class="setbox">
      <div class="settitle">🧠 工控成神录 · 终极会议共识库 (${S.mems.length}/50)</div>
      <div class="setmempanel">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;color:#64748b">圆桌会议沉淀出的高价值账目：</span>
          ${S.mems.length > 0 ? `<button class="memclear" onclick="S.mems=[];localStorage.removeItem('gkcsn_m');toast('🗑 纪要库已清空');render();">清空全部</button>` : ''}
        </div>
        <div class="setmemlist">${setMemHtml}</div>
      </div>

      <div class="settitle" style="margin-top:14px">⚙️ 席位管理 (只有配置了Key的AI才会参与圆桌辩论)</div>
      <div style="max-height:160px;overflow-y:auto;margin-bottom:6px;">
        ${S.customAis.map((ai, idx) => `<div class="setrow" style="background:rgba(255,255,255,0.02);padding:6px;border-radius:6px;border:1px solid #1e293b;margin-bottom:5px">
          <div style="flex:1; overflow:hidden">
            <div style="font-weight:700;font-size:12px;color:#38bdf8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ai.name} <span style="font-size:9px;color:#475569;font-weight:normal">(${ai.modelName||'default'})</span></div>
            <div style="font-size:9px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px">${ai.url}</div>
          </div>
          <input class="setinput" type="password" style="max-width:80px;margin:0 4px" placeholder="${ai.key?'●●●●已配':'未配Key'}" onchange="if(this.value){S.customAis[${idx}].key=this.value.trim();saveCustomAis();toast('席位Key已就位')}">
          <button class="setdel" onclick="deleteAi(${idx}, event)">撤席</button>
        </div>`).join('')}
      </div>

      <div class="addbox">
        <div style="font-size:11px;color:#f59e0b;margin-bottom:6px;font-weight:700">➕ 邀请新 AI 教授入席圆桌</div>
        <div class="setrow"><span class="setname">AI 别称</span><input class="setinput" id="new_name" placeholder="如：本地大模型"></div>
        <div class="setrow"><span class="setname">API URL</span><input class="setinput" id="new_url" placeholder="完整 https://... 请求端点"></div>
        <div class="setrow"><span class="setname">模型代码</span><input class="setinput" id="new_mname" placeholder="如 deepseek-chat (选填)"></div>
        <div class="setrow"><span class="setname">API Key</span><input class="setinput" type="password" id="new_key" placeholder="输入密钥 KEY"></div>
        <div class="setrow">
          <span class="setname">协议规范</span>
          <select id="new_type" class="setinput" style="background:#0a0f1a;color:#fff">
            <option value="openai">OpenAI 兼容规范</option>
            <option value="gemini">Google Gemini 原生规范</option>
          </select>
        </div>
        <button class="addbtn" onclick="addNewAi()">准 许 入 席</button>
      </div>

      <button class="setclose" onclick="S.showSet=false;render()">保存并关闭会议室</button>
    </div></div>` : '';      

  const oldVal = document.getElementById('mInp')?.value || S.inp;

  document.getElementById('app').innerHTML = `
    ${S.toast ? `<div class="toast">${S.toast}</div>` : ''}
    <header>
      <div class="logo">工控成神录 <span>辩论圆桌</span></div>
      <div class="hdr">
        <button class="hbtn" onclick="S.msgs=[];toast('🗑 会议记录已封存销毁')">清空</button>
        <button class="hbtn ${S.showSet?'on':''}" onclick="S.showSet=!S.showSet;render()">⚙ 管理面</button>
      </div>
    </header>
    <div class="ctrlbar">
      <span style="font-size:11px;color:#f59e0b;padding:3px 4px;font-weight:700;white-space:nowrap">📢 议题主导:</span>
      ${ROLES.map(r => `<button class="chip ${S.role.id===r.id?'cg':''}" onclick="S.role=ROLES.find(x=>x.id==='${r.id}');render()">${r.icon} ${r.name}</button>`).join('')}
    </div>
    <main id="chatMain">${msgsHtml}<div id="end"></div></main>
    <footer>
      <div class="inputrow">
        <textarea id="mInp" rows="2" placeholder="投递工控疑难杂症到圆桌（所有已配Key的AI将联合会审）..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}" oninput="S.inp=this.value"></textarea>
        <button class="sendbtn" onclick="send()" ${S.loading?'disabled':''}>${S.loading?'⏳':'CONVENE'}</button>
      </div>
      <div class="hint">物理回车交付圆桌会审 · 多机达成共识后自动沉淀至底层记忆</div>
    </footer>
    ${setHtml}`;

  const ta = document.getElementById('mInp');
  if(ta) { 
    ta.value = oldVal; 
    if(!oldVal && S.msgs.length > 0) { ta.focus(); }
  }
  
  if(S.msgs.length === 0) { updateStage3D(); }
  scrollEnd();
}

setInterval(() => {
  if (S.msgs.length === 0 && !S.showSet) {
    S.angle += 0.025; 
    updateStage3D();
  }
}, 30);

render();
</script>
</body>
</html>
