<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工控神录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090d16;color:#cbd5e1;font-family:Consolas,Monaco,'Courier New',monospace;font-size:13px;height:100vh;overflow:hidden;-webkit-user-select:none;user-select:none}
.container{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;border-left:1px solid #1e293b;border-right:1px solid #1e293b;position:relative}
header{background:#0f172a;padding:12px 14px;border-bottom:1px solid rgba(245,158,11,0.25);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{font-weight:900;font-size:15px;letter-spacing:2px;color:#f8fafc}
.hdr{display:flex;gap:6px;align-items:center}
.hbtn{background:none;border:1px solid #1e293b;color:#64748b;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.hbtn:hover{border-color:#f59e0b;color:#f59e0b}
.hbtn.on{border-color:#38bdf8;color:#38bdf8}
.ctrlbar{background:#0a0f1a;padding:7px 12px;border-bottom:1px solid #1e293b;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;align-items:center}

.topic-wrapper{display:flex;align-items:center;background:#0f172a;border:1px dashed #38bdf8;border-radius:10px;padding:0 4px 0 0;flex-shrink:0}
.topic-input{background:none;border:none;color:#38bdf8;padding:4px 6px;font-size:11px;font-family:inherit;outline:none;width:110px}
.topic-input::placeholder{color:#1e293b}
.topic-clear{background:none;border:none;color:#475569;cursor:pointer;font-size:10px;padding:2px;display:flex;align-items:center;justify-content:center}
.topic-clear:hover{color:#ef4444}

.chip{padding:4px 10px;border:1px solid #1e293b;border-radius:12px;font-size:11px;color:#475569;cursor:pointer;white-space:nowrap;background:none;font-family:inherit;transition:all .18s}
.chip:hover{border-color:#334155;color:#94a3b8}
.chip.cg{border-color:#38bdf8;color:#38bdf8;background:rgba(56,189,248,0.07)}
.sep{width:1px;height:16px;background:#1e293b;flex-shrink:0;margin:0 3px;align-self:center}

main{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;padding:30px 16px;text-align:center;position:relative}
.stage3d{width:240px;height:180px;position:relative;display:flex;align-items:center;justify-content:center;perspective:1000px}
.wcat{font-size:54px;position:absolute;z-index:10;user-select:none;transition:all 0.3s}
.orbit-ai{position:absolute;padding:2px 6px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.4);border-radius:4px;color:#38bdf8;font-size:10px;white-space:nowrap;font-weight:700;pointer-events:none;box-shadow:0 0 8px rgba(56,189,248,0.2);transform-origin:center center}

.wtitle{font-size:17px;font-weight:900;color:#f59e0b;letter-spacing:3px;margin-top:5px}
.wdesc{font-size:11px;color:#475569;line-height:1.8}
.msgrow{display:flex;gap:7px;align-items:flex-start}
.msgrow.u{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid #1e293b;background:#0f172a}
.bbl{max-width:82%;padding:9px 12px;border-radius:10px;line-height:1.6;word-break:break-word;font-size:13px;-webkit-user-select:text;user-select:text}
.bbl.u{background:#f59e0b;color:#020617;font-weight:600;border-radius:10px 10px 0 10px;cursor:pointer;position:relative}
.bbl.ai{background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;border-radius:10px 10px 10px 0}
.bbl.deb{background:#09111e;border:1px dashed #38bdf8;color:#93c5fd;border-radius:10px}
.bbl.er{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#f87171;border-radius:10px 10px 10px 0}
.mmeta{display:flex;gap:5px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.mtag{font-size:10px;padding:1px 6px;border-radius:3px;font-family:Consolas,monospace;background:rgba(245,158,11,0.12);color:#f59e0b}
.mtag.deb{background:rgba(56,189,248,0.15);color:#38bdf8}
.mts{font-size:10px;color:#334155;margin-left:auto}
.mtr{font-size:10px;color:#334155;text-align:right;margin-top:3px}

.codeblock{background:#020617;border:1px solid rgba(56,189,248,0.12);border-radius:7px;margin:7px 0;overflow:hidden}
.codelang{padding:3px 10px;background:rgba(56,189,248,0.07);font-size:10px;color:#38bdf8;border-bottom:1px solid rgba(56,189,248,0.08);display:flex;justify-content:space-between;align-items:center}
.codecopy{background:none;border:none;color:#475569;cursor:pointer;font-size:10px;font-family:inherit;padding:0}
.codecopy:hover{color:#38bdf8}
pre{margin:0;padding:9px 11px;font-size:12px;overflow-x:auto;color:#86efac;line-height:1.55}
.memtag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 7px;background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.2);border-radius:8px;color:#34d399;margin-top:5px}

.typing{display:flex;align-items:center;gap:4px;padding:2px 0}
.typing i{width:6px;height:6px;border-radius:50%;background:#f59e0b;opacity:.4;animation:blink 1.1s infinite;font-style:normal}
.typing i:nth-child(2){animation-delay:.2s}
.typing i:nth-child(3){animation-delay:.4s}
.ttxt{font-size:11px;color:#f59e0b;margin-left:5px;font-weight:bold;letter-spacing:1px}
@keyframes blink{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

footer{padding:10px 12px 12px;border-top:1px solid #1e293b;background:rgba(9,13,22,0.98);flex-shrink:0}
.inputrow{display:flex;gap:7px;align-items:flex-end}
textarea{flex:1;background:#0a0f1a;border:1px solid #1e293b;border-radius:8px;padding:9px 12px;color:#f8fafc;font-family:Consolas,Monaco,monospace;font-size:13px;resize:none;outline:none;line-height:1.5;max-height:110px}
textarea:focus{border-color:rgba(245,158,11,0.5)}
.sendbtn{background:#f59e0b;color:#020617;border:none;padding:9px 16px;border-radius:8px;font-weight:900;cursor:pointer;font-size:13px;font-family:inherit;letter-spacing:1px;white-space:nowrap;flex-shrink:0}
.sendbtn:disabled{opacity:.3;cursor:not-allowed}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:15px}
.setbox{background:#0f172a;border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:16px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.settitle{font-size:12px;color:#f59e0b;font-weight:700;letter-spacing:2px;margin-bottom:10px;border-bottom:1px solid rgba(245,158,11,0.15);padding-bottom:3px}
.setrow{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.setname{font-size:11px;color:#64748b;width:75px;flex-shrink:0}
.setinput{flex:1;background:rgba(255,255,255,0.04);border:1px solid #1e293b;border-radius:5px;padding:5px 8px;color:#f8fafc;font-size:11px;font-family:Consolas,monospace;outline:none}
.setinput:focus{border-color:#f59e0b}
.setdel{background:none;border:1px solid rgba(239,68,68,0.4);color:#ef4444;padding:2px 6px;border-radius:4px;cursor:pointer;font-size:10px}
.addbox{background:rgba(255,255,255,0.02);border:1px dashed #334155;border-radius:8px;padding:10px;margin-top:10px;margin-bottom:12px}
.addbtn{width:100%;padding:6px;background:#38bdf8;color:#020617;border:none;border-radius:5px;cursor:pointer;font-weight:700;font-size:11px;margin-top:6px}
.setclose{width:100%;padding:9px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:#f59e0b;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,0.9);color:#020617;padding:5px 16px;border-radius:16px;font-size:11px;z-index:300;font-weight:700;white-space:nowrap}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ====================================================================
// 👑 永久核心 AI 接口列表（任何人点开网页直接能用，多端绝对不丢失）
// ====================================================================
var PERMANENT_AIS = [
  {name: "永久-Gemini", url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=", key: "在这里直接替换你的Gemini_API_KEY", modelName: "gemini-2.0-flash", type: "gemini"}
];

var ROLES=[
  {id:'fault',icon:'⚡',name:'故障诊断',prompt:'核心任务：工控故障诊断。输出：①最可能原因（按概率降序）②具体排查步骤③寄存器/参数地址。'},
  {id:'plc',icon:'💻',name:'PLC编程',prompt:'核心任务：PLC编程。直接给出能粘贴使用的代码，注明平台（博途SCL/三菱ST/欧姆龙ST），必须有中文注释。'},
  {id:'robot',icon:'🦾',name:'机器人',prompt:'核心任务：工业机器人（FANUC/安川/川崎/ABB/KUKA）。给出具体操作路径、菜单名称、参数值。'},
  {id:'comm',icon:'🔗',name:'通信调试',prompt:'核心任务：工业通信（Profinet/EtherCAT/Modbus）。给出具体配置参数、IP/站号设置。'}
];

var PERSONA_CAT='你是《工控神录》AI副驾驶，代号"黑猫特工"。人设：根据用户改变，变成用户喜欢的。';
var KWS=['西门子','三菱','安川','FANUC','川崎','ABB','KUKA','欧姆龙','Profinet','Modbus','EtherCAT','PLC','变频器','伺服','报警','故障','SCL','博途'];
var extractKW = function(t){ return KWS.filter(function(k){ return t.indexOf(k) > -1; }); };

// 🛠️ 设备独享本地临时席位（保留原有机制，利用LocalStorage）
var localTempAis = [];
try { var lt = localStorage.getItem('gkcsn_local_ais'); if(lt) localTempAis = JSON.parse(lt); } catch(e){}

var S = {
  activeRoleIds: ['fault'], 
  customTopic: '', 
  loading: false,
  showSet: false,
  isAdmin: false, // 是否验证通过管理员暗号，仅用于管理核心接口
  toast: '',
  toastTimer: null,
  inp: '',
  localAis: localTempAis, 
  angle: 0
};

// 动态聚合当前就位的所有 AI 接口
function getAllActiveAis() {
  var list = [];
  // 1. 永久核心接口：完全开放，直接入列
  PERMANENT_AIS.forEach(function(ai){
    if(ai.key && ai.key.length > 10 && ai.key.indexOf('在这里') === -1) {
      list.push(Object.assign({}, ai, {isCore: true}));
    }
  });
  // 2. 当前设备本地添加的临时接口
  S.localAis.forEach(function(ai){ list.push(Object.assign({}, ai, {isCore: false})); });
  return list;
}

var saveLocalAis = function() { localStorage.setItem('gkcsn_local_ais', JSON.stringify(S.localAis)); };
var now2 = function() { return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}); };

function toast(msg){
  clearTimeout(S.toastTimer); S.toast=msg;
  var el = document.getElementById('toastBox');
  if(el) { el.textContent = msg; el.style.display = msg ? 'block' : 'none'; }
  S.toastTimer=setTimeout(function(){ S.toast=''; if(el) el.style.display='none'; },2200);
}

function toggleRole(roleId) {
  var idx = S.activeRoleIds.indexOf(roleId);
  if (idx > -1) { S.activeRoleIds.splice(idx, 1); } else { S.activeRoleIds.push(roleId); }
  renderCtrlBar();
}

async function requestAi(ai, sys, msg) {
  var fullUrl = ai.url;
  if(ai.type === 'gemini' || fullUrl.indexOf('generativelanguage.googleapis.com') > -1) {
    if(fullUrl.indexOf('key=') === -1) fullUrl += (fullUrl.indexOf('?') > -1 ? '&' : '?') + 'key=' + ai.key;
    var r = await fetch(fullUrl, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        system_instruction: {parts: [{text: sys}]},
        contents: [{role:'user', parts:[{text: msg}]}],
        generationConfig: {maxOutputTokens: 800, temperature: 0.4}
      })
    });
    if(!r.ok) { var e = await r.json().catch(function(){return {};}); throw new Error((e && e.error && e.error.message) || 'HTTP ' + r.status); }
    var d = await r.json();
    return (d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts && d.candidates[0].content.parts[0] && d.candidates[0].content.parts[0].text) || '解析失败';
  } else {
    var r = await fetch(fullUrl, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ai.key },
      body: JSON.stringify({ model: ai.modelName || 'default', messages: [{role: 'system', content: sys}, {role: 'user', content: msg}], max_tokens: 800, temperature: 0.4 })
    });
    if(!r.ok) { var e = await r.json().catch(function(){return {};}); throw new Error((e && e.error && e.error.message) || 'HTTP ' + r.status); }
    var d = await r.json();
    return (d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content) || '解析失败';
  }
}

function buildSys(q, activeTopic, activeRoles) {
  var sys = PERSONA_CAT + '\n\n';
  if (activeRoles && activeRoles.length > 0) {
    sys += '【💡 技术阵列】：\n';
    activeRoles.forEach(function(rId) {
      var target = ROLES.find(function(r){ return r.id === rId; });
      if(target) sys += '• [' + target.name + ']：' + target.prompt + '\n';
    });
  }
  if(activeTopic && activeTopic.trim()){ sys += '\n\n【🔥 核心议题】：优先运用：' + activeTopic.trim() + '。'; }
  return sys;
}

function renderContent(text){
  var esc = function(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  return text.split(/(```[\s\S]*?```)/g).map(function(p) {
    if(p.indexOf('```') === 0){
      var lines = p.slice(3,-3).split('\n');
      var lang = lines[0].trim() || 'code';
      var code = lines.slice(1).join('\n');
      return '<div class="codeblock"><div class="codelang"><span>'+lang+'</span><button class="codecopy" onclick="cpCode(this,\''+btoa(unescape(encodeURIComponent(code)))+'\')">复制</button></div><pre>'+esc(code)+'</pre></div>';
    }
    return '<span style="white-space:pre-wrap">'+esc(p)+'</span>';
  }).join('');
}

function cpCode(btn, b64){
  try{navigator.clipboard.writeText(decodeURIComponent(escape(atob(b64)))); btn.textContent='✅'; setTimeout(function(){btn.textContent='复制';},1500);}catch(e){}
}

function scrollEnd(){ setTimeout(function() { var m = document.getElementById('chatMain'); if(m) m.scrollTop = m.scrollHeight; }, 50); }

function handleAdminLogin() {
  var p = document.getElementById('admin_pass').value.trim();
  if(p === 'gkslhdw666') { 
    S.isAdmin = true; 
    toast('🔓 最高控制权验证通过，核心管理就绪！'); 
    renderOverlay舱(); 
  } else { 
    alert('管理暗号错误！'); 
  }
}

// 👑 管理员核心机制：动态生成并打包包含最新核心 AI 数据的文件
function exportNewHtmlCode() {
  var currentCode = document.documentElement.outerHTML;
  var dataStr = "var PERMANENT_AIS = " + JSON.stringify(PERMANENT_AIS, null, 2) + ";";
  var updatedCode = currentCode.replace(/var PERMANENT_AIS\s*=\s*\[[\s\S]*?\];/g, dataStr);
  
  var blob = new Blob([updatedCode], {type: "text/html;charset=utf-8"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "工控神录.html";
  a.click();
  toast("💾 最新全开放多设备文件已生成并下载！");
}

async function send(){
  var text = S.inp.trim();
  if(!text || S.loading) return;

  var activeAis = getAllActiveAis();
  if(activeAis.length === 0) { toast('⚠️ 当前没有可调用的 AI 接口，请点击右上角 [⚙ 管理面] 查看配置！'); return; }

  var currentTurnTopic = S.customTopic ? S.customTopic.trim() : '';
  var currentTurnRoles = S.activeRoleIds.slice();

  var chatMain = document.getElementById('chatMain');
  var welcomeBox = chatMain.querySelector('.welcome');
  if(welcomeBox) { chatMain.innerHTML = ''; }

  var uRow = document.createElement('div'); uRow.className = 'msgrow u';
  uRow.innerHTML = '<div class="bbl u">' + text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '<div class="mtr">' + now2() + '</div></div>';
  chatMain.appendChild(uRow);

  S.inp = ''; S.customTopic = '';
  var ta = document.getElementById('mInp'); if(ta) ta.value = '';
  var ti = document.getElementById('tInp'); if(ti) ti.value = '';
  scrollEnd();

  var loadRow = document.createElement('div'); loadRow.className = 'msgrow';
  loadRow.innerHTML = '<div class="av">✨</div><div class="bbl ai" style="border-color:#f59e0b"><div class="typing"><i></i><i></i><i></i><span class="ttxt" id="loadingTxt">🔥 联合会审中...</span></div></div>';
  chatMain.appendChild(loadRow);
  scrollEnd();

  var runningLog = '【故障问题】：' + text + '\n';
  var finalSolution = "";
  var debateRound = 1, maxRounds = 3, consensusReached = false;
  var conflictSummary = [];

  S.loading = true;
  var sendBtn = document.getElementById('sendBtn'); if(sendBtn) sendBtn.disabled = true;

  try {
    while(debateRound <= maxRounds && !consensusReached) {
      var roundAgreements = 0;
      for(var i=0; i < activeAis.length; i++) {
        var currentAi = activeAis[i];
        var lTxt = document.getElementById('loadingTxt');
        if(lTxt) lTxt.textContent = '🔥 联合会审... [' + currentAi.name + ' R' + debateRound + ']';

        var instructionPrompt = '【工控高阶圆桌会审控制指令】\n' + runningLog + '\n';
        if (debateRound === 1 && i === 0) {
          instructionPrompt += '请作为首发节点给出最精确初代方案。';
        } else {
          instructionPrompt += '【前轮审议底卷】：请深审上方方案，若有潜在隐患立刻反驳修正！完全同意则开头带上“【完全同意，达成共识】”！';
        }

        var reply = await requestAi(currentAi, buildSys(text, currentTurnTopic, currentTurnRoles), instructionPrompt);
        var isAgree = reply.indexOf('完全同意') > -1 || reply.indexOf('达成共识') > -1;
        
        if(isAgree) { roundAgreements++; } 
        else if(debateRound > 1) { conflictSummary.push('[' + currentAi.name + ' R' + debateRound + '] 反驳：' + reply.slice(0, 40) + '...'); }

        runningLog += '▶ [' + currentAi.name + ']: ' + reply + '\n\n';
        
        var dRow = document.createElement('div'); dRow.className = 'msgrow';
        dRow.innerHTML = '<div class="av">💬</div><div class="bbl ai deb"><div class="mmeta"><span class="mtag deb">' + currentAi.name + ' [R' + debateRound + ']</span><span style="font-size:10px;color:#475569">' + (isAgree ? '🟢 附议' : '⚡ 反驳') + '</span><span class="mts">' + now2() + '</span></div>' + renderContent(reply) + '</div>';
        chatMain.insertBefore(dRow, loadRow);
        scrollEnd();
        
        if(!isAgree || !finalSolution) finalSolution = reply;
      }
      if(roundAgreements === activeAis.length || activeAis.length === 1) { consensusReached = true; } else { debateRound++; }
    }

    var kw = extractKW(text + finalSolution);
    var finalBlockText = '🏆 【圆桌收敛最终决议】\n\n' + finalSolution;
    if(conflictSummary.length > 0) finalBlockText += '\n\n-----------------------------------------\n🔍 【分歧追溯】：\n• ' + conflictSummary.join('\n• ');

    var fRow = document.createElement('div'); fRow.className = 'msgrow';
    var kwHtml = (kw.length > 0) ? '<div class="memtag">🧠 共识 · ' + kw.slice(0,3).join(' · ') + '</div>' : '';
    fRow.innerHTML = '<div class="av">🏆</div><div class="bbl ai"><div class="mmeta"><span class="mtag">圆桌联合会议</span><span class="mts">' + now2() + '</span></div>' + renderContent(finalBlockText) + kwHtml + '</div>';
    chatMain.insertBefore(fRow, loadRow);
  } catch(e) {
    var errRow = document.createElement('div'); errRow.className = 'msgrow';
    errRow.innerHTML = '<div class="av">⚠</div><div class="bbl er">❌ 通信中断: ' + e.message + '</div>';
    chatMain.insertBefore(errRow, loadRow);
  }

  if(loadRow && loadRow.parentNode) loadRow.parentNode.removeChild(loadRow);
  S.loading = false; if(sendBtn) sendBtn.disabled = false; scrollEnd();
}

// 核心席位管理逻辑
function addPermanentNodeAdmin() {
  var name = document.getElementById('p_name').value.trim();
  var url = document.getElementById('p_url').value.trim();
  var key = document.getElementById('p_key').value.trim();
  var mName = document.getElementById('p_mname').value.trim();
  var type = document.getElementById('p_type').value;
  if(!name || !url || !key) { alert('请填全永久节点信息！'); return; }
  PERMANENT_AIS.push({name: name, url: url, key: key, modelName: mName, type: type});
  toast('✅ 永久席位已加入序列！请务必点击下方按钮导出新版本源码文件！');
  renderOverlay舱();
}

function deletePermanentNodeAdmin(idx) {
  PERMANENT_AIS.splice(idx, 1);
  toast('🗑️ 永久席位已移除！请记得导出更新文件！');
  renderOverlay舱();
}

// 本地设备独享席位管理
function addLocalNode() {
  var name = document.getElementById('l_name').value.trim();
  var url = document.getElementById('l_url').value.trim();
  var key = document.getElementById('l_key').value.trim();
  var mName = document.getElementById('l_mname').value.trim();
  var type = document.getElementById('l_type').value;
  if(!name || !url || !key) { alert('请填全本地节点信息！'); return; }
  S.localAis.push({name: name, url: url, key: key, modelName: mName, type: type});
  saveLocalAis(); toast('✅ 本地独享节点已存入当前浏览器');
  renderOverlay舱();
}

function deleteLocalNode(idx) { S.localAis.splice(idx, 1); saveLocalAis(); toast('🗑️ 本地席位已移除'); renderOverlay舱(); }

function updateStage3D() {
  var stage = document.getElementById('dynamicStage3D'); if(!stage) return;
  var orbitHtml = ''; var allAis = getAllActiveAis(); var activeCount = allAis.length;
  if(activeCount === 0) {
    stage.innerHTML = '<div class="wcat">🐱</div><div style="font-size:10px;color:#64748b;position:absolute;bottom:0">快加入你的神辅助</div>';
    return;
  }
  S.angle += 0.025;
  allAis.forEach(function(ai, idx) {
    var personalAngle = S.angle + (idx * (Math.PI * 2 / activeCount));
    var x = Math.cos(personalAngle) * 85; var y = Math.sin(personalAngle) * 35;
    var sinNorm = Math.sin(personalAngle);
    var scale = 0.72 + (sinNorm + 1) * 0.23;
    var styleStr = 'transform: translate3d(' + x + 'px, ' + y + 'px, 0px) scale(' + scale + '); opacity: ' + (0.5 + (sinNorm + 1) * 0.3) + '; z-index: ' + Math.floor((sinNorm + 1) * 10) + ';';
    if(ai.isCore) styleStr += 'border-color:#34d399;color:#34d399;';
    orbitHtml += '<div class="orbit-ai" style="' + styleStr + '">' + (ai.isCore ? '👑 ' : '⚡ ') + ai.name + '</div>';
  });
  stage.innerHTML = '<div class="wcat">🐱</div>' + orbitHtml;
}

function initAppStructure() {
  var app = document.getElementById('app');
  app.innerHTML = '<div id="toastBox" class="toast" style="display:none"></div>' +
    '<header><div class="logo">工控神录</div><div class="hdr"><button class="hbtn" onclick="document.getElementById(\'chatMain\').innerHTML=\'\';toast(\'面板已复位\')">清空</button><button class="hbtn" id="cfgBtn" onclick="toggleOverlay(true)">⚙ 管理面</button></div></header>' +
    '<div class="ctrlbar" id="ctrlBar"></div>' +
    '<main id="chatMain"><div class="welcome"><div class="stage3d" id="dynamicStage3D"></div><div class="wtitle">工控神录</div><div class="wdesc">开启你的成神路</div></div></main>' +
    '<footer><div class="inputrow"><textarea id="mInp" rows="2" placeholder="输入成神指令..." oninput="S.inp=this.value"></textarea><button class="sendbtn" id="sendBtn" onclick="send()">CONVENE</button></div></footer>' +
    '<div id="overlayContainer"></div>';
  renderCtrlBar();
}

function renderCtrlBar() {
  var bar = document.getElementById('ctrlBar'); if(!bar) return;
  var rolesHtml = ROLES.map(function(r) {
    return '<button class="' + ((S.activeRoleIds.indexOf(r.id) > -1) ? 'chip cg' : 'chip') + '" onclick="toggleRole(\''+r.id+'\')">' + r.icon + ' ' + r.name + '</button>';
  }).join('');
  bar.innerHTML = '<div class="topic-wrapper"><input id="tInp" class="topic-input" type="text" placeholder="✍️ 主导议题..." oninput="S.customTopic=this.value"><button class="topic-clear" onclick="S.customTopic=\'\';var ti=document.getElementById(\'tInp\'); if(ti)ti.value=\'\';">❌</button></div><div class="sep"></div>' + rolesHtml;
}

function toggleOverlay(show) { S.showSet = show; var container = document.getElementById('overlayContainer'); if(!show) { container.innerHTML = ''; return; } renderOverlay舱(); }

function renderOverlay舱() {
  var container = document.getElementById('overlayContainer'); if(!container) return;
  
  // 核心永久通道列表展示
  var permanentListHtml = (PERMANENT_AIS.length === 0) ? '<div style="font-size:10px;color:#475569">暂无永久核心接口</div>' : PERMANENT_AIS.map(function(ai, idx){
    return '<div class="setrow" style="background:rgba(52,211,153,0.02);padding:4px;border-radius:4px;border:1px solid rgba(52,211,153,0.2)"><div style="font-size:11px;color:#34d399;flex:1">👑 '+ai.name+'</div>' + (S.isAdmin ? '<button class="setdel" onclick="deletePermanentNodeAdmin('+idx+')">移除</button>' : '') + '</div>';
  }).join('');

  // 设备独享本地通道列表展示
  var localListHtml = (S.localAis.length === 0) ? '<div style="font-size:10px;color:#475569">暂无当前设备独享接口</div>' : S.localAis.map(function(ai, idx){
    return '<div class="setrow" style="background:rgba(255,255,255,0.02);padding:4px;border-radius:4px;border:1px solid #1e293b"><div style="font-size:11px;color:#38bdf8;flex:1">⚡ '+ai.name+'</div><button class="setdel" onclick="deleteLocalNode('+idx+')">丢弃</button></div>';
  }).join('');

  // 管理员后台操作舱
  var adminPanelHtml = !S.isAdmin ? 
    '<div class="addbox" style="border-color:rgba(245,158,11,0.25)"><div style="font-size:11px;color:#f59e0b;margin-bottom:6px;font-weight:700">🔒 核心通道特权管理：输入密码进入</div><div class="setrow"><span class="setname">特权密码</span><input class="setinput" type="password" id="admin_pass" placeholder="输入特权暗号解锁"></div><button class="addbtn" style="background:#f59e0b" onclick="handleAdminLogin()">验证权限</button></div>' :
    '<div class="addbox" style="border-color:#34d399; background:rgba(52,211,153,0.02)"><div style="font-size:11px;color:#34d399;font-weight:700;margin-bottom:6px;">🛠️ 最高管理特权已开启</div>' +
    '<input class="setinput" id="p_name" placeholder="永久节点名（如：生产线Gemini）">' +
    '<input class="setinput" id="p_url" value="[https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=](https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=)" placeholder="API URL">' +
    '<input class="setinput" id="p_mname" value="gemini-2.0-flash" placeholder="模型代码">' +
    '<input class="setinput" type="password" id="p_key" placeholder="API Key 密钥">' +
    '<select id="p_type" class="setinput" style="background:#0a0f1a;color:#fff;width:100%"><option value="gemini">Gemini 原生</option><option value="openai">OpenAI 规范</option></select>' +
    '<button class="addbtn" style="background:#34d399" onclick="addPermanentNodeAdmin()">并入核心通道库</button>' +
    '<button class="addbtn" style="background:#e11d48;color:#fff;margin-top:10px;" onclick="exportNewHtmlCode()">💾 立即打包下载最新网页文件</button></div>';

  container.innerHTML = '<div class="overlay" id="setOverlay" onclick="if(event.target===this)toggleOverlay(false)"><div class="setbox">' +
    '<div class="settitle">👑 永久核心席位（全开放，所有设备直接使用）</div>' +
    '<div style="max-height:100px;overflow-y:auto;margin-bottom:10px;">' + permanentListHtml + '</div>' +
    adminPanelHtml +
    '<div class="settitle" style="margin-top:14px">⚡ 当前设备独享席位（LocalStorage 仅存留此设备）</div>' +
    '<div style="max-height:80px;overflow-y:auto;margin-bottom:6px;">' + localListHtml + '</div>' +
    '<div class="addbox"><div style="font-size:11px;color:#38bdf8;margin-bottom:4px;font-weight:700">➕ 仅塞入当前设备缓存</div><input class="setinput" id="l_name" placeholder="节点名"><input class="setinput" id="l_url" placeholder="API URL"><input class="setinput" id="l_mname" placeholder="模型代码"><input class="setinput" type="password" id="l_key" placeholder="密钥 KEY"><select id="l_type" class="setinput" style="background:#0a0f1a;color:#fff;width:100%"><option value="openai">OpenAI 规范</option></select><button class="addbtn" onclick="addLocalNode()">加入此设备</button></div>' +
    '<button class="setclose" onclick="toggleOverlay(false)">关闭控制舱</button></div></div>';
}

initAppStructure();
setInterval(updateStage3D, 30);
</script>
</body>
</html>
