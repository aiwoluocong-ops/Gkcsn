<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工控成神录</title>
<script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.12.0/dist/av-min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090d16;color:#cbd5e1;font-family:Consolas,Monaco,'Courier New',monospace;font-size:13px;height:100dvh;overflow:hidden}
.container{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;border-left:1px solid #1e293b;border-right:1px solid #1e293b}
header{background:#0f172a;padding:12px 14px;border-bottom:1px solid rgba(245,158,11,0.25);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{font-weight:900;font-size:15px;letter-spacing:2px;color:#f8fafc}.logo span{color:#f59e0b}
.hdr{display:flex;gap:6px;align-items:center}
.hbtn{background:none;border:1px solid #1e293b;color:#64748b;padding:4px 9px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.hbtn:hover{border-color:#f59e0b;color:#f59e0b}
.hbtn.on{border-color:#38bdf8;color:#38bdf8}
.keybar{background:rgba(245,158,11,0.06);border-bottom:1px solid rgba(245,158,11,0.2);padding:7px 12px;display:flex;gap:7px;align-items:center;flex-shrink:0}
.keylabel{font-size:11px;color:#f59e0b;white-space:nowrap}
.keyinput{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(245,158,11,0.3);border-radius:5px;padding:4px 9px;color:#f8fafc;font-family:inherit;font-size:12px;outline:none}
.keysave{background:#f59e0b;color:#020617;border:none;padding:4px 12px;border-radius:5px;cursor:pointer;font-weight:700;font-size:12px;font-family:inherit}
.syncbar{background:rgba(52,211,153,0.05);border-bottom:1px solid rgba(52,211,153,0.15);padding:6px 14px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#34d399;flex-shrink:0}
.mempanel{background:rgba(15,23,42,0.7);border-left:3px solid #34d399;margin:10px 12px;padding:9px 11px;border-radius:0 8px 8px 0;flex-shrink:0}
.memtitle{font-size:10px;color:#34d399;font-weight:700;letter-spacing:1px;margin-bottom:5px}
.memlist{max-height:95px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.memitem{font-size:11px;color:#cbd5e1;line-height:1.4;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.memitem:last-child{border-bottom:none}
main{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:#1e293b transparent}
main::-webkit-scrollbar{width:3px}
main::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;padding:30px 16px;text-align:center}
.wcat{font-size:48px;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.wtitle{font-size:17px;font-weight:900;color:#f59e0b;letter-spacing:3px}
.wdesc{font-size:12px;color:#475569;margin-top:4px}
.msgrow{display:flex;gap:7px;align-items:flex-start}
.msgrow.u{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid #1e293b;background:#0f172a}
.bbl{max-width:82%;padding:9px 12px;border-radius:10px;line-height:1.6;word-break:break-word;font-size:13px}
.bbl.u{background:#f59e0b;color:#020617;font-weight:600;border-radius:10px 10px 0 10px}
.bbl.ai{background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;border-radius:10px 10px 10px 0}
.bbl.er{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#f87171;border-radius:10px 10px 10px 0}
.mmeta{display:flex;gap:5px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.mts{font-size:10px;color:#334155;margin-left:auto}
.mtr{font-size:10px;color:#334155;text-align:right;margin-top:3px}
.codeblock{background:#020617;border:1px solid rgba(56,189,248,0.12);border-radius:7px;margin:7px 0;overflow:hidden}
.codelang{padding:3px 10px;background:rgba(56,189,248,0.07);font-size:10px;color:#38bdf8;border-bottom:1px solid rgba(56,189,248,0.08);display:flex;justify-content:space-between;align-items:center}
.codecopy{background:none;border:none;color:#475569;cursor:pointer;font-size:10px;font-family:inherit;padding:0}
.codecopy:hover{color:#38bdf8}
pre{margin:0;padding:9px 11px;font-size:12px;overflow-x:auto;color:#86efac;line-height:1.55}
.typing{display:flex;align-items:center;gap:4px;padding:2px 0}
.typing i{width:6px;height:6px;border-radius:50%;background:#f59e0b;opacity:.4;animation:blink 1.1s infinite;font-style:normal}
.typing i:nth-child(2){animation-delay:.2s}
.typing i:nth-child(3){animation-delay:.4s}
.ttxt{font-size:11px;color:#334155;margin-left:5px}
@keyframes blink{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
footer{padding:10px 12px 12px;border-top:1px solid #1e293b;background:rgba(9,13,22,0.98);flex-shrink:0}
.inputrow{display:flex;gap:7px;align-items:flex-end}
textarea{flex:1;background:#0a0f1a;border:1px solid #1e293b;border-radius:8px;padding:9px 12px;color:#f8fafc;font-family:Consolas,Monaco,monospace;font-size:13px;resize:none;outline:none;line-height:1.5;max-height:110px;transition:border-color .2s}
textarea:focus{border-color:rgba(245,158,11,0.5)}
.sendbtn{background:#f59e0b;color:#020617;border:none;padding:9px 16px;border-radius:8px;font-weight:900;cursor:pointer;font-size:13px;font-family:inherit;letter-spacing:1px;transition:all .2s;white-space:nowrap;flex-shrink:0}
.sendbtn:disabled{opacity:.3;cursor:not-allowed}
.sendbtn:not(:disabled):hover{background:#fbbf24;box-shadow:0 0 12px rgba(245,158,11,0.4)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.setbox{background:#0f172a;border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:18px;width:100%;max-width:380px}
.settitle{font-size:13px;color:#f59e0b;font-weight:700;letter-spacing:2px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.setrow{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.setname{font-size:11px;color:#64748b;width:85px;flex-shrink:0}
.setinput{flex:1;background:rgba(255,255,255,0.04);border:1px solid #1e293b;border-radius:5px;padding:5px 9px;color:#f8fafc;font-size:11px;font-family:Consolas,monospace;outline:none}
.setdel{background:none;border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:3px 7px;border-radius:4px;cursor:pointer;font-size:10px;font-family:inherit}
.setclose{width:100%;margin-top:12px;padding:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:#f59e0b;border-radius:7px;cursor:pointer;font-size:13px;font-family:inherit}
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,0.15);border:1px solid #f59e0b;color:#f59e0b;padding:5px 16px;border-radius:16px;font-size:11px;z-index:300;white-space:nowrap;letter-spacing:1px}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
try {
  AV.init({ 
    appId: "XbI9XwV7AunFwL63b5WHezpy-MdYXbMMI", 
    appKey: "f6lbyS0MIsXfVp99fWpSmF6C", 
    serverURL: "https://xbi9xwv7.api.lncldglobal.com" 
  });
} catch(e) { console.error("Cloud Init Error", e); }

const SYSTEM_PROMPT = `你是《工控成神录》副驾驶。你是一针见血、极度专业的工控领域资深专家。核心任务是解决工控故障诊断、PLC编程、工业机器人、工业通信等硬核技术问题。直接给出精准的原因、排查步骤、寄存器地址、参数或可运行代码，禁止说废话，不给模糊和长篇大论的空洞回答。`;

// 联脑提炼机制专用 Prompt
const REFINER_PROMPT = `你现在是多个顶级大模型联合化身的【工控经验提炼专家】。请把用户输入的[工控问题]与AI给出的[核心诊断结果]进行高度浓缩。
要求：
1. 提取出最干货的技术结论。格式固定为：【设备型号/领域】现象/报警码 -> 根本原因 -> 核心解决方法或寄存器/关键参数。
2. 剔除所有客套话、解释和废话，控制在80个字以内，直接输出这一行技术结论，不要带有任何多余字符。`;

let S={
  msgs:[],loading:false,
  showMem:true,showSet:false,toast:'',toastTimer:null,
  syncCode: localStorage.getItem('gkcsn_sync_code') || '',
  cloudStatus: '未设置同步',
  keys:(()=>{try{return JSON.parse(localStorage.getItem('gkcsn_k')||'{}')}catch{return{}}})(),
  mems:(()=>{try{return JSON.parse(localStorage.getItem('gkcsn_m')||'[]')}catch{return[]}})(),
  inp:'',
};

const saveKeys=()=>localStorage.setItem('gkcsn_k',JSON.stringify(S.keys));
const saveMems=()=>localStorage.setItem('gkcsn_m',JSON.stringify(S.mems));
const now2=()=>new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
const nowF=()=>new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});

function toast(msg){
  clearTimeout(S.toastTimer);S.toast=msg;render();
  S.toastTimer=setTimeout(()=>{S.toast='';render();},2200);
}

async function pushToCloud() {
  if (!S.syncCode) return;
  S.cloudStatus = '同步中...'; render();
  try {
    const query = new AV.Query('GongKongCloud');
    query.equalTo('syncCode', S.syncCode);
    let record = await query.first();
    if (!record) {
      const GongKongCloud = AV.Object.extend('GongKongCloud');
      record = new GongKongCloud();
      record.set('syncCode', S.syncCode);
    }
    record.set('keysData', JSON.stringify(S.keys));
    record.set('memsData', JSON.stringify(S.mems));
    await record.save();
    S.cloudStatus = '云端同步完毕';
  } catch (e) {
    S.cloudStatus = '同步失败';
  }
  render();
}

async function pullFromCloud() {
  if (!S.syncCode) return;
  S.cloudStatus = '同步中...'; render();
  try {
    const query = new AV.Query('GongKongCloud');
    query.equalTo('syncCode', S.syncCode);
    const record = await query.first();
    if (record) {
      if(record.get('keysData')) { S.keys = JSON.parse(record.get('keysData')); saveKeys(); }
      if(record.get('memsData')) { S.mems = JSON.parse(record.get('memsData')); saveMems(); }
      S.cloudStatus = '云端同步完毕';
      toast('📂 记忆已与云端无缝承接');
    } else {
      S.cloudStatus = '新节点就绪';
      await pushToCloud();
    }
  } catch (e) {
    S.cloudStatus = '同步失败';
    toast('❌ 无法连接云端');
  }
  render();
}

function buildSys(q){
  let sys = SYSTEM_PROMPT;
  const rel = S.mems.filter(m => m.text.toLowerCase().includes(q.slice(0,15).toLowerCase())).slice(0,5);
  if(rel.length > 0){
    sys += '\n\n【多设备联脑提炼的最终硬核记忆储备】\n';
    rel.forEach(m => { sys += `• ${m.text}\n`; });
  }
  return sys;
}

function renderContent(text){
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return text.split(/(```[\s\S]*?```)/g).map(p=>{
    if(p.startsWith('```')){
      const lines=p.slice(3,-3).split('\n');
      const lang=lines[0].trim()||'code';
      const code=lines.slice(1).join('\n');
      return `<div class="codeblock"><div class="codelang"><span>${lang}</span><button class="codecopy" onclick="cpCode(this,'${btoa(unescape(encodeURIComponent(code)))}')">复制</button></div><pre>${esc(code)}</pre></div>`;
    }
    return `<span style="white-space:pre-wrap">${esc(p)}</span>`;
  }).join('');
}

function cpCode(btn,b64){
  try{navigator.clipboard?.writeText(decodeURIComponent(escape(atob(b64))));btn.textContent='✅';setTimeout(()=>btn.textContent='复制',1500);}catch(e){}
}

function scrollEnd(){setTimeout(()=>{const m=document.querySelector('main');if(m)m.scrollTop=m.scrollHeight;},50);}

// 联脑级核心提炼函数（让大模型以群脑协作思想处理核心要点）
async function requestRefinedMemory(key, userQ, aiReply) {
  try {
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:REFINER_PROMPT}]},
        contents:[{role:'user',parts:[{text:`[工控问题]: ${userQ}\n[核心诊断结果]: ${aiReply}`}]}],
        generationConfig:{maxOutputTokens:150,temperature:0.3}
      })
    });
    if(!r.ok) return null;
    const d=await r.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || null;
  } catch(e) {
    return null;
  }
}

async function send(){
  const text=S.inp.trim();
  if(!text||S.loading)return;
  const key=S.keys['gemini'];
  if(!key){toast('⚠️ 请先配置 API Key');return;}
  S.msgs.push({role:'user',content:text,ts:now2()});
  S.inp='';S.loading=true;render();scrollEnd();
  try{
    const contents=[];
    const hist=S.msgs.slice(-13,-1).filter(m=>m.role==='user'||m.role==='assistant');
    hist.forEach(m=>contents.push({role:m.role==='user'?'user':'model',parts:[{text:m.content}]}));
    contents.push({role:'user',parts:[{text:text}]});

    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system_instruction:{parts:[{text:buildSys(text)}]},contents,generationConfig:{maxOutputTokens:2048,temperature:0.75}})
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'Gemini '+r.status);}
    const d=await r.json();
    const reply = d.candidates?.[0]?.content?.parts?.[0]?.text||'（无返回）';

    S.msgs.push({role:'assistant',content:reply,ts:now2()});
    render();scrollEnd();

    // 后台无感调用联脑提炼机制
    let refinedText = await requestRefinedMemory(key, text, reply);
    // 如果后台提炼有误或超时，则采用兜底的纯干货记录
    if(!refinedText) {
      refinedText = `[实战总结] 问:${text.slice(0,25)} -> 答:${reply.slice(0,45)}`;
    }

    const mem={id:Date.now(),time:nowF(),text:refinedText};
    S.mems=[mem,...S.mems].slice(0,80);
    saveMems();
    pushToCloud();
  }catch(e){S.msgs.push({role:'error',content:e.message,ts:now2()});}
  S.loading=false;render();scrollEnd();
}

function render(){
  const needKey=!S.keys['gemini'];
  let msgsHtml='';
  if(S.msgs.length===0){
    msgsHtml=`<div class="welcome">
      <div class="wcat">🐱</div>
      <div class="wtitle">工控成神录</div>
      <div class="wdesc">开始成神</div>
    </div>`;
  }else{
    const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    msgsHtml=S.msgs.map(m=>{
      if(m.role==='user')return `<div class="msgrow u"><div class="bbl u">${esc(m.content)}<div class="mtr">${m.ts}</div></div></div>`;
      if(m.role==='error')return `<div class="msgrow"><div class="av">⚠</div><div class="bbl er">${m.content}</div></div>`;
      return `<div class="msgrow"><div class="av">🐱</div><div class="bbl ai">
        <div class="mmeta"><span class="mts">${m.ts}</span></div>
        ${renderContent(m.content)}</div></div>`;
    }).join('');
    if(S.loading)msgsHtml+=`<div class="msgrow"><div class="av">🐱</div><div class="bbl ai"><div class="typing"><i></i><i></i><i></i><span class="ttxt">正在分析...</span></div></div></div>`;
  }

  const memHtml=S.mems.length===0
    ?'<div style="font-size:11px;color:#334155;padding:4px 0">暂无记忆 · 开启对话即可长久沉淀</div>'
    :S.mems.slice(0,8).map(m=>`<div class="memitem"><span style="color:#34d399;font-size:10px">✔</span> ${m.text}</div>`).join('');

  const setHtml=S.showSet?`<div class="overlay" onclick="if(event.target===this){S.showSet=false;render();}">
    <div class="setbox">
      <div class="settitle"><span>☁️ 跨设备云同步配置</span></div>
      <div class="setrow" style="margin-bottom:15px;">
        <span class="setname" style="color:#34d399;font-weight:bold;">同步密码</span>
        <input class="setinput" style="border-color:#34d399" type="text" value="${S.syncCode}" placeholder="定义你的跨端密码" onchange="updateSyncCode(this.value)">
      </div>
      <div style="height:1px;background:#1e293b;margin:12px 0;"></div>
      <div class="settitle">⚙️ API KEY 密钥管理</div>
      <div class="setrow">
        <span class="setname" style="color:#38bdf8">Gemini Key</span>
        <input class="setinput" type="password" placeholder="${S.keys['gemini']?'已配置 ●●●●●':'未配置'}" onchange="if(this.value){S.keys['gemini']=this.value;saveKeys();pushToCloud();}">
        ${S.keys['gemini']?`<button class="setdel" onclick="delete S.keys['gemini'];saveKeys();pushToCloud();render();">删</button>`:''}
      </div>
      <button class="setclose" onclick="S.showSet=false;render()">保存并关闭</button>
    </div></div>`:'';      

  document.getElementById('app').innerHTML=`
    ${S.toast?`<div class="toast">${S.toast}</div>`:''}
    <header>
      <div class="logo">工控成神录 <span>CORE</span></div>
      <div class="hdr">
        <button class="hbtn" onclick="S.msgs=[];toast('🗑 已清空')">清空</button>
        <button class="hbtn ${S.showMem?'on':''}" onclick="S.showMem=!S.showMem;render()">🧠 ${S.mems.length}</button>
        <button class="hbtn ${S.showSet?'on':''}" onclick="S.showSet=!S.showSet;render()">⚙️ 同步</button>
      </div>
    </header>
    ${S.syncCode ? `<div class="syncbar"><span>☁️ ${S.cloudStatus}</span><span>代号: ${S.syncCode}</span></div>` : ''}
    ${needKey?`<div class="keybar"><span class="keylabel">🔑 Gemini Key</span><input class="keyinput" type="password" id="kInp" placeholder="请在此输入有效的 API Key" onkeydown="if(event.key==='Enter')saveKey()"><button class="keysave" onclick="saveKey()">保存</button></div>`:''}
    ${S.showMem?`<div class="mempanel"><div class="memtitle">🐾 智能记忆库 (${S.mems.length})</div><div class="memlist">${memHtml}</div></div>`:''}
    <main id="chatMain">${msgsHtml}<div id="end"></div></main>
    <footer>
      <div class="inputrow">
        <textarea id="mInp" rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}" oninput="S.inp=this.value">${S.inp}</textarea>
        <button class="sendbtn" onclick="send()" ${S.loading||!S.inp.trim()?'disabled':''}>${S.loading?'⏳':'SEND'}</button>
      </div>
    </footer>
    ${setHtml}`;

  const ta=document.getElementById('mInp');
  if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}
  scrollEnd();
}

function saveKey(){
  const v=document.getElementById('kInp')?.value?.trim();
  if(!v)return;
  S.keys['gemini']=v;saveKeys();pushToCloud();toast('✅ Key 已保存并同步');
}

function updateSyncCode(val) {
  const code = val.trim();
  S.syncCode = code;
  localStorage.setItem('gkcsn_sync_code', code);
  if(code) { pullFromCloud(); } else { S.cloudStatus = '未设置同步'; render(); }
}

if(S.syncCode) { pullFromCloud(); } else { render(); }
</script>
</body>
</html>
