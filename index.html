<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工控神录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090d16;color:#cbd5e1;font-family:Consolas,Monaco,'Courier New',monospace;font-size:13px;height:100vh;overflow:hidden;-webkit-user-select:none;user-select:none}
.container{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;border-left:1px solid #1e293b;border-right:1px solid #1e293b;position:relative}
header{background:#0f172a;padding:12px 14px;border-bottom:1px solid rgba(245,158,11,0.25);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{font-weight:900;font-size:15px;letter-spacing:2px;color:#f8fafc}
.hdr{display:flex;gap:6px;align-items:center}
.hbtn{background:none;border:1px solid #1e293b;color:#64748b;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.hbtn:hover{border-color:#f59e0b;color:#f59e0b}
.hbtn.on{border-color:#38bdf8;color:#38bdf8}
.ctrlbar{background:#0a0f1a;padding:7px 12px;border-bottom:1px solid #1e293b;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;align-items:center}

.topic-wrapper{display:flex;align-items:center;background:#0f172a;border:1px dashed #38bdf8;border-radius:10px;padding:0 4px 0 0;flex-shrink:0}
.topic-input{background:none;border:none;color:#38bdf8;padding:4px 6px;font-size:11px;font-family:inherit;outline:none;width:110px}
.topic-input::placeholder{color:#1e293b}
.topic-clear{background:none;border:none;color:#475569;cursor:pointer;font-size:10px;padding:2px;display:flex;align-items:center;justify-content:center}
.topic-clear:hover{color:#ef4444}

.chip{padding:4px 10px;border:1px solid #1e293b;border-radius:12px;font-size:11px;color:#475569;cursor:pointer;white-space:nowrap;background:none;font-family:inherit;transition:all .18s}
.chip:hover{border-color:#334155;color:#94a3b8}
.chip.cg{border-color:#38bdf8;color:#38bdf8;background:rgba(56,189,248,0.07)}
.sep{width:1px;height:16px;background:#1e293b;flex-shrink:0;margin:0 3px;align-self:center}
main{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}

.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;padding:30px 16px;text-align:center;position:relative}
.stage3d{width:240px;height:180px;position:relative;display:flex;align-items:center;justify-content:center;perspective:1000px}
.wcat{font-size:54px;position:absolute;z-index:10;user-select:none;transition:all 0.3s}
.wcat.godmode{transform:scale(1.2);text-shadow:0 0 25px #f59e0b;animation:pulse 1s infinite alternate}
@keyframes pulse{0%{transform:scale(1.15)}100%{transform:scale(1.25)}}
.orbit-ai{position:absolute;padding:2px 6px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.4);border-radius:4px;color:#38bdf8;font-size:10px;white-space:nowrap;font-weight:700;pointer-events:none;box-shadow:0 0 8px rgba(56,189,248,0.2);transform-origin:center center}

.wtitle{font-size:17px;font-weight:900;color:#f59e0b;letter-spacing:3px;margin-top:5px}
.wdesc{font-size:11px;color:#475569;line-height:1.8}
.msgrow{display:flex;gap:7px;align-items:flex-start}
.msgrow.u{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid #1e293b;background:#0f172a}
.bbl{max-width:82%;padding:9px 12px;border-radius:10px;line-height:1.6;word-break:break-word;font-size:13px;-webkit-user-select:text;user-select:text}
.bbl.u{background:#f59e0b;color:#020617;font-weight:600;border-radius:10px 10px 0 10px;cursor:pointer;position:relative}
.bbl.ai{background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;border-radius:10px 10px 10px 0}
.bbl.deb{background:#09111e;border:1px dashed #38bdf8;color:#93c5fd;border-radius:10px}
.bbl.er{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#f87171;border-radius:10px 10px 10px 0}
.mmeta{display:flex;gap:5px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.mtag{font-size:10px;padding:1px 6px;border-radius:3px;font-family:Consolas,monospace;background:rgba(245,158,11,0.12);color:#f59e0b}
.mtag.deb{background:rgba(56,189,248,0.15);color:#38bdf8}
.mts{font-size:10px;color:#334155;margin-left:auto}
.mtr{font-size:10px;color:#334155;text-align:right;margin-top:3px}

.codeblock{background:#020617;border:1px solid rgba(56,189,248,0.12);border-radius:7px;margin:7px 0;overflow:hidden}
.codelang{padding:3px 10px;background:rgba(56,189,248,0.07);font-size:10px;color:#38bdf8;border-bottom:1px solid rgba(56,189,248,0.08);display:flex;justify-content:space-between;align-items:center}
.codecopy{background:none;border:none;color:#475569;cursor:pointer;font-size:10px;font-family:inherit;padding:0}
.codecopy:hover{color:#38bdf8}
pre{margin:0;padding:9px 11px;font-size:12px;overflow-x:auto;color:#86efac;line-height:1.55}
.memtag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 7px;background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.2);border-radius:8px;color:#34d399;margin-top:5px}

.typing{display:flex;align-items:center;gap:4px;padding:2px 0}
.typing i{width:6px;height:6px;border-radius:50%;background:#f59e0b;opacity:.4;animation:blink 1.1s infinite;font-style:normal}
.typing i:nth-child(2){animation-delay:.2s}
.typing i:nth-child(3){animation-delay:.4s}
.ttxt{font-size:11px;color:#f59e0b;margin-left:5px;font-weight:bold;letter-spacing:1px}
@keyframes blink{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

footer{padding:10px 12px 12px;border-top:1px solid #1e293b;background:rgba(9,13,22,0.98);flex-shrink:0}
.inputrow{display:flex;gap:7px;align-items:flex-end}
textarea{flex:1;background:#0a0f1a;border:1px solid #1e293b;border-radius:8px;padding:9px 12px;color:#f8fafc;font-family:Consolas,Monaco,monospace;font-size:13px;resize:none;outline:none;line-height:1.5;max-height:110px}
textarea:focus{border-color:rgba(245,158,11,0.5)}
.sendbtn{background:#f59e0b;color:#020617;border:none;padding:9px 16px;border-radius:8px;font-weight:900;cursor:pointer;font-size:13px;font-family:inherit;letter-spacing:1px;white-space:nowrap;flex-shrink:0}
.sendbtn:disabled{opacity:.3;cursor:not-allowed}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:15px}
.setbox{background:#0f172a;border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:16px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.settitle{font-size:12px;color:#f59e0b;font-weight:700;letter-spacing:2px;margin-bottom:10px;border-bottom:1px solid rgba(245,158,11,0.15);padding-bottom:3px}
.setrow{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.setname{font-size:11px;color:#64748b;width:75px;flex-shrink:0}
.setinput{flex:1;background:rgba(255,255,255,0.04);border:1px solid #1e293b;border-radius:5px;padding:5px 8px;color:#f8fafc;font-size:11px;font-family:Consolas,monospace;outline:none}
.setinput:focus{border-color:#f59e0b}
.setdel{background:none;border:1px solid rgba(239,68,68,0.4);color:#ef4444;padding:2px 6px;border-radius:4px;cursor:pointer;font-size:10px}
.addbox{background:rgba(255,255,255,0.02);border:1px dashed #334155;border-radius:8px;padding:10px;margin-top:10px;margin-bottom:12px}
.addbtn{width:100%;padding:6px;background:#38bdf8;color:#020617;border:none;border-radius:5px;cursor:pointer;font-weight:700;font-size:11px;margin-top:6px}
.setclose{width:100%;padding:9px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:#f59e0b;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,0.9);color:#020617;padding:5px 16px;border-radius:16px;font-size:11px;z-index:300;font-weight:700;white-space:nowrap}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ===================================================
// 🍎 出厂固化默认接口项
// ===================================================
var FACTORY_AIS = [
  {name:'永久-Gemini', url:'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=', key:'', modelName:'gemini-2.0-flash', type:'gemini', isCore:true}
];

var ROLES=[
  {id:'fault',icon:'⚡',name:'故障诊断',prompt:'核心任务：工控故障诊断。输出：①最可能原因（按概率降序）②具体排查步骤③寄存器/参数地址。'},
  {id:'plc',icon:'💻',name:'PLC编程',prompt:'核心任务：PLC编程。直接给出能粘贴使用的代码，注明平台（博途SCL/三菱ST/欧姆龙ST），必须有中文注释。'},
  {id:'robot',icon:'🦾',name:'机器人',prompt:'核心任务：工业机器人（FANUC/安川/川崎/ABB/KUKA）。给出具体操作路径、菜单名称、参数值。'},
  {id:'comm',icon:'🔗',name:'通信调试',prompt:'核心任务：工业通信（Profinet/EtherCAT/Modbus）。给出具体配置参数、IP/站号设置。'}
];

var PERSONA_CAT='你是《工控神录》AI副驾驶，代号"黑猫特工"。人设：高冷理性、一针见血。核心要求：每次回答必须极其精炼，严禁超过250字，严禁说任何客套废话！';
var KWS=['西门子','三菱','安川','FANUC','川崎','ABB','KUKA','欧姆龙','Profinet','Modbus','EtherCAT','PLC','变频器','伺服','报警','故障','SCL','博途'];
var extractKW = function(t){ return KWS.filter(function(k){ return t.indexOf(k) > -1; }); };

var adminStoredAis = [];
try {
  var localCore = localStorage.getItem('gkcsn_core_permanent_ais');
  if(localCore) { adminStoredAis = JSON.parse(localCore); } else { adminStoredAis = FACTORY_AIS; localStorage.setItem('gkcsn_core_permanent_ais', JSON.stringify(adminStoredAis)); }
} catch(e) { adminStoredAis = FACTORY_AIS; }

var temporaryAis = [];
try {
  var localTemp = localStorage.getItem('gkcsn_custom_ais');
  if(localTemp) temporaryAis = JSON.parse(localTemp);
} catch(e) { temporaryAis = []; }

var savedMems = [];
try {
  var localMems = localStorage.getItem('gkcsn_m');
  if(localMems) savedMems = JSON.parse(localMems);
} catch(e) { savedMems = []; }

var S = {
  activeRoleIds: ['fault'], 
  customTopic: '', 
  msgs: [],
  loading: false,
  showSet: false,
  isAdmin: false, 
  toast: '',
  toastTimer: null,
  inp: '',
  coreAis: adminStoredAis,  
  customAis: temporaryAis, 
  mems: savedMems,
  angle: 0,
  currentSpeaker: '',
  feedbackStates: {} 
};

function getAllAis() { return S.coreAis.concat(S.customAis); }
var saveCoreAis = function() { localStorage.setItem('gkcsn_core_permanent_ais', JSON.stringify(S.coreAis)); };
var saveCustomAis = function() { localStorage.setItem('gkcsn_custom_ais', JSON.stringify(S.customAis)); };
var saveMems = function() { localStorage.setItem('gkcsn_m', JSON.stringify(S.mems)); };
var now2 = function() { return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}); };
var nowF = function() { return new Date().toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'}); };

function toast(msg){
  clearTimeout(S.toastTimer); S.toast=msg; render();
  S.toastTimer=setTimeout(function(){S.toast=''; render();},2200);
}

function toggleRole(roleId) {
  var idx = S.activeRoleIds.indexOf(roleId);
  if (idx > -1) { S.activeRoleIds.splice(idx, 1); } else { S.activeRoleIds.push(roleId); }
  render();
}

async function requestAi(ai, sys, hist, msg) {
  if(!ai.key) throw new Error('未检测到 [' + ai.name + '] 的有效 API Key！');
  if(ai.type === 'gemini' || ai.url.indexOf('generativelanguage.googleapis.com') > -1) {
    var contents = [];
    hist.forEach(function(m) { contents.push({role: m.role==='user'?'user':'model', parts:[{text: m.content}]}); });
    contents.push({role:'user', parts:[{text: msg}]});
    var fullUrl = ai.url;
    if(fullUrl.indexOf('key=') === -1) fullUrl += (fullUrl.indexOf('?') > -1 ? '&' : '?') + 'key=' + ai.key;
    var r = await fetch(fullUrl, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        system_instruction: {parts: [{text: sys}]},
        contents: contents,
        generationConfig: {maxOutputTokens: 800, temperature: 0.4}
      })
    });
    if(!r.ok) { var e = await r.json().catch(function(){return {};}); throw new Error((e && e.error && e.error.message) || 'HTTP ' + r.status); }
    var d = await r.json();
    return (d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts && d.candidates[0].content.parts[0] && d.candidates[0].content.parts[0].text) || '（无法解析Gemini）';
  } else {
    var messages = [{role: 'system', content: sys}];
    hist.forEach(function(m) { messages.push({role: m.role==='user'?'user':'assistant', content: m.content}); });
    messages.push({role: 'user', content: msg});
    var r = await fetch(ai.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ai.key },
      body: JSON.stringify({ model: ai.modelName || 'default', messages: messages, max_tokens: 800, temperature: 0.4 })
    });
    if(!r.ok) { var e = await r.json().catch(function(){return {};}); throw new Error((e && e.error && e.error.message) || 'HTTP ' + r.status); }
    var d = await r.json();
    return (d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content) || '（无法解析OpenAI）';
  }
}

function buildSys(q, activeTopic, activeRoles) {
  var sys = PERSONA_CAT + '\n\n';
  if (activeRoles && activeRoles.length > 0) {
    sys += '【💡 当前联合会审技术阵列】：\n';
    activeRoles.forEach(function(rId) {
      var target = ROLES.find(function(r){ return r.id === rId; });
      if(target) sys += '• [' + target.name + '专家模块]：' + target.prompt + '\n';
    });
  }
  if(activeTopic && activeTopic.trim()){ sys += '\n\n【🔥 核心议题绝对主导方向】：优先考虑运用：' + activeTopic.trim() + '。'; }
  var rel = S.mems.filter(function(m) { return extractKW(q).some(function(k) { return m.text.indexOf(k) > -1; }); }).slice(0,3);
  if(rel.length > 0) { sys += '\n\n【历史会议底账】\n'; rel.forEach(function(m) { sys += '• [' + m.time + '] ' + m.text + '\n'; }); }
  return sys;
}

function renderContent(text){
  var esc = function(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  return text.split(/(```[\s\S]*?```)/g).map(function(p) {
    if(p.indexOf('```') === 0){
      var lines = p.slice(3,-3).split('\n');
      var lang = lines[0].trim() || 'code';
      var code = lines.slice(1).join('\n');
      return '<div class="codeblock"><div class="codelang"><span>'+lang+'</span><button class="codecopy" onclick="cpCode(this,\''+btoa(unescape(encodeURIComponent(code)))+'\')">复制</button></div><pre>'+esc(code)+'</pre></div>';
    }
    return '<span style="white-space:pre-wrap">'+esc(p)+'</span>';
  }).join('');
}

function cpCode(btn, b64){
  try{navigator.clipboard.writeText(decodeURIComponent(escape(atob(b64)))); btn.textContent='✅'; setTimeout(function(){btn.textContent='复制';},1500);}catch(e){}
}

function scrollEnd(){ setTimeout(function() { var m = document.querySelector('main'); if(m) m.scrollTop = m.scrollHeight; }, 60); }

function handleAdminLogin() {
  var u = document.getElementById('admin_user').value.trim();
  var p = document.getElementById('admin_pass').value.trim();
  if(u === 'gks' && p === 'gkslhdw666') { S.isAdmin = true; toast('🔓 根控制舱解密成功，永久存储管理权已下放'); } else { alert('账号或暗号不正确！'); }
  render();
}

// 👑 极限强化：多轨深度交叉辩论会审算法
async function send(){
  var text = S.inp.trim();
  if(!text || S.loading) return;

  var allAvailableAis = getAllAis();
  var activeAis = allAvailableAis.filter(function(ai) { return ai.key && ai.key.length > 0; });
  if(activeAis.length === 0) { toast('⚠️ 无任何就位API！请在管理面输入。'); return; }

  var currentTurnTopic = S.customTopic ? S.customTopic.trim() : '';
  var currentTurnRoles = S.activeRoleIds.slice();

  S.msgs.push({ role: 'user', content: text, ts: now2(), id: Date.now(), boundTopic: currentTurnTopic, boundRoles: JSON.stringify(currentTurnRoles) });
  S.inp = ''; S.customTopic = '';
  var ta = document.getElementById('mInp'); if(ta) ta.value = '';
  var ti = document.getElementById('tInp'); if(ti) ti.value = '';
  render(); scrollEnd();

  // 辩论运行状态机
  var runningLog = '【主诉技术故障问题】：' + text + '\n';
  if(currentTurnTopic) runningLog += '【主导技术议题路线】：' + currentTurnTopic + '\n';
  runningLog += '-----------------------------------------\n';

  var finalSolution = "";
  var debateRound = 1;
  var maxRounds = 4; // 提升审议最高天花板
  var consensusReached = false;
  var conflictSummary = []; // 冲突分歧日志

  try {
    S.loading = true;
    while(debateRound <= maxRounds && !consensusReached) {
      var roundAgreements = 0;
      
      for(var i=0; i < activeAis.length; i++) {
        var currentAi = activeAis[i];
        S.currentSpeaker = currentAi.name + ' (辩论轮次: ' + debateRound + ')';
        render(); scrollEnd();

        var instructionPrompt = '【工控高阶圆桌会审控制指令】\n' + runningLog + '\n';
        if (debateRound === 1 && i === 0) {
          instructionPrompt += '请作为首发节点，基于技术阵列给出最精确、硬核的初代故障排查诊断及底层代码级方案。';
        } else {
          instructionPrompt += '【前轮审议底卷】：请深度审阅上方其它节点的诊断方案。若有任何潜在隐患、逻辑漏洞、参数错误、或设备不匹配（如Fanuc与KUKA配置混淆等），请立刻“无情反驳并提出你的修正补足”！\n若你认为对方方案无任何死角、完全同意，则必须开头强行带上关键词“【完全同意，达成共识】”！';
        }

        var reply = await requestAi(currentAi, buildSys(text, currentTurnTopic, currentTurnRoles), [], instructionPrompt);
        var isAgree = reply.indexOf('完全同意') > -1 || reply.indexOf('达成共识') > -1;
        
        if(isAgree) {
          roundAgreements++;
        } else if(debateRound > 1) {
          conflictSummary.push('[' + currentAi.name + ' 轮次' + debateRound + '] 提出修正反驳：' + reply.slice(0, 50) + '...');
        }

        runningLog += '▶ [' + currentAi.name + ' - 审议席]: ' + reply + '\n\n';
        
        S.msgs.push({
          role: 'assistant', isDebate: true, content: reply,
          aiName: currentAi.name + ' [辩论 R' + debateRound + ']',
          roleName: isAgree ? '🟢 附议共识' : '⚡ 激烈反驳/修正',
          ts: now2(), id: Date.now() + Math.random()
        });
        render(); scrollEnd();
        
        if(!isAgree || !finalSolution) finalSolution = reply;
      }
      
      if(roundAgreements === activeAis.length || activeAis.length === 1) { consensusReached = true; } else { debateRound++; }
    }

    var msgId = Date.now();
    var kw = extractKW(text + finalSolution);
    
    // 组合输出最终结论，加入精细的分歧记录
    var finalBlockText = '🏆 【圆桌深度收敛决议案】\n\n' + finalSolution;
    if(conflictSummary.length > 0) {
      finalBlockText += '\n\n-----------------------------------------\n🔍 【技术会审过程分歧追溯案】：\n• ' + conflictSummary.join('\n• ');
    }

    S.msgs.push({
      role: 'assistant', isDebate: false, content: finalBlockText,
      aiName: '圆桌联合会议', roleName: '终审结案决议', ts: now2(), kw: kw, id: msgId
    });
    
    S.mems.unshift({ id: Date.now(), time: nowF(), text: '[结案] 问:' + text.slice(0,12) + '… 结案轮数:' + (debateRound-1), kw: kw });
    saveMems();
  } catch(e) {
    S.msgs.push({role: 'error', content: '❌ 会议通信突发中断: ' + e.message, ts: now2(), id: Date.now()});
  }

  S.loading = false; S.currentSpeaker = '';
  render(); scrollEnd();
}

function addTemporaryNode() {
  var name = document.getElementById('new_name').value.trim();
  var url = document.getElementById('new_url').value.trim();
  var key = document.getElementById('new_key').value.trim();
  var mName = document.getElementById('new_mname').value.trim();
  var type = document.getElementById('new_type').value;
  if(!name || !url || !key) { alert('请填写完整！'); return; }
  S.customAis.push({ name: name, url: url, key: key, modelName: mName, type: type, isCore: false });
  saveCustomAis(); toast('✅ 已并入临时接入区'); render();
}

function addPermanentNode() {
  var name = document.getElementById('core_name').value.trim();
  var url = document.getElementById('core_url').value.trim();
  var key = document.getElementById('core_key').value.trim();
  var mName = document.getElementById('core_mname').value.trim();
  var type = document.getElementById('core_type').value;
  if(!name || !url || !key) { alert('核心接口信息不可为空！'); return; }
  S.coreAis.push({ name: name, url: url, key: key, modelName: mName, type: type, isCore: true });
  saveCoreAis(); toast('👑 永久核心席位已强行加固入库！'); render();
}

function deleteCoreAi(idx, e) { e.stopPropagation(); S.coreAis.splice(idx, 1); saveCoreAis(); toast('🗑️ 永久席位已强行注销'); render(); }
function deleteCustomAi(idx, e) { e.stopPropagation(); S.customAis.splice(idx, 1); saveCustomAis(); toast('🗑️ 临时席位已丢弃'); render(); }

function updateStage3D() {
  var stage = document.getElementById('dynamicStage3D'); if(!stage) return;
  var orbitHtml = ''; var allAis = getAllAis(); var activeCount = allAis.length;
  var catEl = document.querySelector('.wcat');
  if(catEl) { if(S.loading) catEl.classList.add('godmode'); else catEl.classList.remove('godmode'); }
  allAis.forEach(function(ai, idx) {
    var personalAngle = S.angle + (idx * (Math.PI * 2 / activeCount));
    var x = Math.cos(personalAngle) * 85; var y = Math.sin(personalAngle) * 35;
    var sinNorm = Math.sin(personalAngle);
    var scale = 0.72 + (sinNorm + 1) * 0.23; var opacity = ai.key ? (0.5 + (sinNorm + 1) * 0.3) : 0.2;
    orbitHtml += '<div class="orbit-ai" style="transform: translate3d(' + x + 'px, ' + y + 'px, 0px) scale(' + scale + '); opacity: ' + opacity + '; z-index: ' + Math.floor((sinNorm + 1) * 10) + '; ' + (ai.isCore?'border-color:#34d399;color:#34d399;':'') + '">' + (ai.isCore ? '👑 ' : '⚡ ') + ai.name + '</div>';
  });
  stage.innerHTML = '<div class="wcat ' + (S.loading?'godmode':'') + '">🐱</div>' + orbitHtml;
}

function render(){
  var msgsHtml = '';
  if(S.msgs.length === 0) {
    msgsHtml = '<div class="welcome"><div class="stage3d" id="dynamicStage3D"></div><div class="wtitle">工控神录</div><div class="wdesc">极限交叉辩论重构版 · 双轨API独立动态控制舱</div></div>';
  } else {
    msgsHtml = S.msgs.map(function(m) {
      if(m.role === 'user') return '<div class="msgrow u"><div class="bbl u">' + m.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '<div class="mtr">' + m.ts + '</div></div></div>';
      if(m.role === 'error') return '<div class="msgrow"><div class="av">⚠</div><div class="bbl er">' + m.content + '</div></div>';
      var kwtags = (m.kw && m.kw.length > 0) ? '<div class="memtag">🧠 共识 · ' + m.kw.slice(0,3).join(' · ') + '</div>' : '';
      return '<div class="msgrow"><div class="av">' + (m.isDebate?'💬':'🏆') + '</div><div class="' + (m.isDebate ? 'bbl ai deb' : 'bbl ai') + '"><div class="mmeta"><span class="' + (m.isDebate ? 'mtag deb' : 'mtag') + '">' + m.aiName + '</span><span style="font-size:10px;color:#475569">' + m.roleName + '</span><span class="mts">' + m.ts + '</span></div>' + renderContent(m.content) + kwtags + '</div></div>';
    }).join('');
    if(S.loading) { msgsHtml += '<div class="msgrow"><div class="av">✨</div><div class="bbl ai" style="border-color:#f59e0b"><div class="typing"><i></i><i></i><i></i><span class="ttxt">🔥 联合激辩会审中... ['+S.currentSpeaker+']</span></div></div></div>'; }
  }

  var adminSectionHtml = !S.isAdmin ? '<div class="addbox" style="border-color:rgba(239,68,68,0.3)"><div style="font-size:11px;color:#ef4444;margin-bottom:6px;font-weight:700">🔒 锁定区：管理员永久存在API舱</div><div class="setrow"><span class="setname">管理账户</span><input class="setinput" id="admin_user" value="gks"></div><div class="setrow"><span class="setname">特权密码</span><input class="setinput" type="password" id="admin_pass" placeholder="输入特权密码"></div><button class="addbtn" style="background:#f59e0b" onclick="handleAdminLogin()">验证登录管理员</button></div>' : '<div class="addbox" style="border-color:#34d399; background:rgba(52,211,153,0.02)"><div style="font-size:11px;color:#34d399;margin-bottom:6px;font-weight:700">🔓 掌控中：永久存在API席位配置区 (后台永存)</div><input class="setinput" id="core_name" placeholder="永久节点别称"><input class="setinput" id="core_url" placeholder="API EndPoint URL"><input class="setinput" id="core_mname" placeholder="模型代码"><input class="setinput" type="password" id="core_key" placeholder="API KEY 密钥密码"><select id="core_type" class="setinput" style="background:#0a0f1a;color:#fff;width:100%;margin-bottom:6px"><option value="gemini">Gemini 原生协议</option><option value="openai">OpenAI 协议规范</option></select><button class="addbtn" style="background:#34d399; color:#020617" onclick="addPermanentNode()">强行并入永久席位</button></div>';

  var setHtml = S.showSet ? '<div class="overlay" id="setOverlay" onclick="if(event.target===this){S.showSet=false;render();}"><div class="setbox"><div class="settitle">👑 永久席位账目 (管理员可操控)</div><div style="max-height:80px;overflow-y:auto;margin-bottom:10px;">' + S.coreAis.map(function(ai, idx){ return '<div class="setrow" style="background:rgba(52,211,153,0.04);padding:4px;border-radius:4px;border:1px solid rgba(52,211,153,0.2)"><div style="font-size:11px;color:#34d399;flex:1;overflow:hidden;text-overflow:ellipsis">👑 '+ai.name+'</div>' + (S.isAdmin ? '<button class="setdel" onclick="deleteCoreAi('+idx+', event)">销毁</button>' : '<span style="font-size:9px;color:#475569">受保护</span>') + '</div>'; }).join('') + '</div>' + adminSectionHtml + '<div class="settitle" style="margin-top:14px">⚡ 本地/临时设备席位</div><div style="max-height:80px;overflow-y:auto;margin-bottom:6px;">' + (S.customAis.length===0?'<div style="font-size:10px;color:#475569">暂无临时接口</div>':S.customAis.map(function(ai, idx){ return '<div class="setrow" style="background:rgba(255,255,255,0.02);padding:4px;border-radius:4px;border:1px solid #1e293b"><div style="font-size:11px;color:#38bdf8;flex:1">⚡ '+ai.name+'</div><button class="setdel" onclick="deleteCustomAi('+idx+', event)">丢弃</button></div>'; }).join('')) + '</div><div class="addbox"><div style="font-size:11px;color:#38bdf8;margin-bottom:4px;font-weight:700">➕ 接入本地临时轻量节点</div><input class="setinput" id="new_name" placeholder="临时节点名"><input class="setinput" id="new_url" placeholder="API URL"><input class="setinput" id="new_mname" placeholder="模型代码"><input class="setinput" type="password" id="new_key" placeholder="密钥 KEY"><select id="new_type" class="setinput" style="background:#0a0f1a;color:#fff;width:100%"><option value="openai">OpenAI 规范</option><option value="gemini">Gemini 原生</option></select><button class="addbtn" onclick="addTemporaryNode()">临时入席</button></div><button class="setclose" onclick="S.showSet=false;render()">关闭控制舱</button></div></div>' : '';

  var oldVal = (document.getElementById('mInp') && document.getElementById('mInp').value) || S.inp;
  var oldTopic = (document.getElementById('tInp') && document.getElementById('tInp').value) || S.customTopic;

  document.getElementById('app').innerHTML = (S.toast ? '<div class="toast">' + S.toast + '</div>' : '') +
    '<header><div class="logo">工控神录</div><div class="hdr"><button class="hbtn" onclick="S.msgs=[];toast(\'面板已洗牌复位\')">清空</button><button class="hbtn '+(S.showSet?'on':'')+'" onclick="S.showSet=!S.showSet;render()">⚙ 管理面</button></div></header>' +
    '<div class="ctrlbar"><div class="topic-wrapper"><input id="tInp" class="topic-input" type="text" placeholder="✍️ 主导议题..." oninput="S.customTopic=this.value"><button class="topic-clear" onclick="S.customTopic=\'\';document.getElementById(\'tInp\').value=\'\';toast(\'主导释放\');render();">❌</button></div><div class="sep"></div>' +
    ROLES.map(function(r) { return '<button class="chip '+(S.activeRoleIds.indexOf(r.id)>-1?'cg':'')+'" onclick="toggleRole(\''+r.id+'\')">' + r.icon + ' ' + r.name + '</button>'; }).join('') +
    '</div><main id="chatMain">' + msgsHtml + '<div id="end"></div></main>' +
    '<footer><div class="inputrow"><textarea id="mInp" rows="2" placeholder="投递突发工业故障..." oninput="S.inp=this.value"></textarea><button class="sendbtn" onclick="send()" '+(S.loading?'disabled':'')+'>'+(S.loading?'⏳':'CONVENE')+'</button></div></footer>' + setHtml;

  var ta = document.getElementById('mInp'); if(ta) ta.value = oldVal;
  var ti = document.getElementById('tInp'); if(ti) ti.value = oldTopic;
  updateStage3D();
}

setInterval(function() { S.angle += 0.025; updateStage3D(); }, 30);
render();
</script>
</body>
</html>
