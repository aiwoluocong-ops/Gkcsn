<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工控成神录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090d16;color:#cbd5e1;font-family:Consolas,Monaco,'Courier New',monospace;font-size:13px;height:100dvh;overflow:hidden}
.container{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;border-left:1px solid #1e293b;border-right:1px solid #1e293b}
header{background:#0f172a;padding:12px 14px;border-bottom:1px solid rgba(245,158,11,0.25);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{font-weight:900;font-size:15px;letter-spacing:2px;color:#f8fafc}.logo span{color:#f59e0b}
.hdr{display:flex;gap:6px;align-items:center}
.hbtn{background:none;border:1px solid #1e293b;color:#64748b;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.hbtn:hover{border-color:#f59e0b;color:#f59e0b}
.hbtn.on{border-color:#38bdf8;color:#38bdf8}
.ctrlbar{background:#0a0f1a;padding:7px 12px;border-bottom:1px solid #1e293b;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.ctrlbar::-webkit-scrollbar{display:none}
.chip{padding:3px 10px;border:1px solid #1e293b;border-radius:12px;font-size:11px;color:#475569;cursor:pointer;white-space:nowrap;background:none;font-family:inherit;transition:all .18s}
.chip:hover{border-color:#334155;color:#94a3b8}
.chip.cg{border-color:#38bdf8;color:#38bdf8;background:rgba(56,189,248,0.07)}
.chip.ca{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,0.07)}
.chip.cp{border-color:#a78bfa;color:#a78bfa;background:rgba(167,139,250,0.07)}
.sep{width:1px;height:16px;background:#1e293b;flex-shrink:0;margin:0 3px;align-self:center}
.keybar{background:rgba(245,158,11,0.06);border-bottom:1px solid rgba(245,158,11,0.2);padding:7px 12px;display:flex;gap:7px;align-items:center;flex-shrink:0}
.keylabel{font-size:11px;color:#f59e0b;white-space:nowrap}
.keyinput{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(245,158,11,0.3);border-radius:5px;padding:4px 9px;color:#f8fafc;font-family:inherit;font-size:12px;outline:none}
.keysave{background:#f59e0b;color:#020617;border:none;padding:4px 12px;border-radius:5px;cursor:pointer;font-weight:700;font-size:12px;font-family:inherit}
.mempanel{background:rgba(15,23,42,0.7);border-left:3px solid #34d399;margin:10px 12px;padding:9px 11px;border-radius:0 8px 8px 0;flex-shrink:0}
.memtitle{font-size:10px;color:#34d399;font-weight:700;letter-spacing:1px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.memclear{background:none;border:none;color:#ef4444;font-size:10px;cursor:pointer;font-family:inherit}
.memlist{max-height:72px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.memitem{font-size:11px;color:#64748b;line-height:1.4;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.memitem:last-child{border-bottom:none}
.memkw{display:inline-block;font-size:9px;padding:0 5px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);border-radius:8px;color:#38bdf8;margin-left:4px}
main{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:#1e293b transparent}
main::-webkit-scrollbar{width:3px}
main::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;padding:30px 16px;text-align:center}
.wcat{font-size:48px;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.wtitle{font-size:17px;font-weight:900;color:#f59e0b;letter-spacing:3px}
.wdesc{font-size:11px;color:#475569;line-height:1.8}
.wtips{display:flex;flex-direction:column;gap:6px;width:100%;max-width:340px;margin-top:4px}
.wtip{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.15);color:#64748b;padding:8px 12px;border-radius:7px;cursor:pointer;font-size:11px;text-align:left;transition:all .2s;font-family:inherit}
.wtip:hover{border-color:#f59e0b;color:#f59e0b}
.msgrow{display:flex;gap:7px;align-items:flex-start}
.msgrow.u{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid #1e293b;background:#0f172a}
.bbl{max-width:82%;padding:9px 12px;border-radius:10px;line-height:1.6;word-break:break-word;font-size:13px}
.bbl.u{background:#f59e0b;color:#020617;font-weight:600;border-radius:10px 10px 0 10px}
.bbl.ai{background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;border-radius:10px 10px 10px 0}
.bbl.er{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#f87171;border-radius:10px 10px 10px 0}
.mmeta{display:flex;gap:5px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.mtag{font-size:10px;padding:1px 6px;border-radius:3px;font-family:Consolas,monospace}
.mtg{background:rgba(56,189,248,0.12);color:#38bdf8}
.mta{background:rgba(245,158,11,0.12);color:#f59e0b}
.mtp{background:rgba(167,139,250,0.12);color:#a78bfa}
.mts{font-size:10px;color:#334155;margin-left:auto}
.mtr{font-size:10px;color:#334155;text-align:right;margin-top:3px}
.codeblock{background:#020617;border:1px solid rgba(56,189,248,0.12);border-radius:7px;margin:7px 0;overflow:hidden}
.codelang{padding:3px 10px;background:rgba(56,189,248,0.07);font-size:10px;color:#38bdf8;border-bottom:1px solid rgba(56,189,248,0.08);display:flex;justify-content:space-between;align-items:center}
.codecopy{background:none;border:none;color:#475569;cursor:pointer;font-size:10px;font-family:inherit;padding:0}
.codecopy:hover{color:#38bdf8}
pre{margin:0;padding:9px 11px;font-size:12px;overflow-x:auto;color:#86efac;line-height:1.55}
.memtag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 7px;background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.2);border-radius:8px;color:#34d399;margin-top:5px}
.typing{display:flex;align-items:center;gap:4px;padding:2px 0}
.typing i{width:6px;height:6px;border-radius:50%;background:#f59e0b;opacity:.4;animation:blink 1.1s infinite;font-style:normal}
.typing i:nth-child(2){animation-delay:.2s}
.typing i:nth-child(3){animation-delay:.4s}
.ttxt{font-size:11px;color:#334155;margin-left:5px}
@keyframes blink{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
footer{padding:10px 12px 12px;border-top:1px solid #1e293b;background:rgba(9,13,22,0.98);flex-shrink:0}
.inputrow{display:flex;gap:7px;align-items:flex-end}
textarea{flex:1;background:#0a0f1a;border:1px solid #1e293b;border-radius:8px;padding:9px 12px;color:#f8fafc;font-family:Consolas,Monaco,monospace;font-size:13px;resize:none;outline:none;line-height:1.5;max-height:110px;transition:border-color .2s}
textarea:focus{border-color:rgba(245,158,11,0.5)}
.sendbtn{background:#f59e0b;color:#020617;border:none;padding:9px 16px;border-radius:8px;font-weight:900;cursor:pointer;font-size:13px;font-family:inherit;letter-spacing:1px;transition:all .2s;white-space:nowrap;flex-shrink:0}
.sendbtn:disabled{opacity:.3;cursor:not-allowed}
.sendbtn:not(:disabled):hover{background:#fbbf24;box-shadow:0 0 12px rgba(245,158,11,0.4)}
.hint{font-size:10px;color:#1e293b;margin-top:5px;text-align:center}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.setbox{background:#0f172a;border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:18px;width:100%;max-width:380px}
.settitle{font-size:13px;color:#f59e0b;font-weight:700;letter-spacing:2px;margin-bottom:14px}
.setrow{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.setname{font-size:11px;color:#64748b;width:85px;flex-shrink:0}
.setinput{flex:1;background:rgba(255,255,255,0.04);border:1px solid #1e293b;border-radius:5px;padding:5px 9px;color:#f8fafc;font-size:11px;font-family:Consolas,monospace;outline:none}
.setdel{background:none;border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:3px 7px;border-radius:4px;cursor:pointer;font-size:10px;font-family:inherit}
.setnote{font-size:11px;color:#334155;background:rgba(255,255,255,0.02);border-radius:5px;padding:8px 10px;margin-top:8px}
.setclose{width:100%;margin-top:12px;padding:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:#f59e0b;border-radius:7px;cursor:pointer;font-size:13px;font-family:inherit}
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,0.15);border:1px solid #f59e0b;color:#f59e0b;padding:5px 16px;border-radius:16px;font-size:11px;z-index:300;white-space:nowrap;letter-spacing:1px}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const MODELS=[
  {id:'gemini',name:'Gemini',sub:'2.0 Flash',dot:'#38bdf8',cls:'cg',av:'🐱',
   async call(key,sys,hist,msg){
    const contents=[];
    hist.forEach(m=>contents.push({role:m.role==='user'?'user':'model',parts:[{text:m.content}]}));
    contents.push({role:'user',parts:[{text:msg}]});
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents,generationConfig:{maxOutputTokens:2048,temperature:0.75}})
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'Gemini '+r.status);}
    const d=await r.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'（无返回）';
   }
  },
  {id:'claude',name:'Claude',sub:'Sonnet 4',dot:'#f59e0b',cls:'ca',av:'🤖',
   async call(key,sys,hist,msg){
    const messages=[...hist.map(m=>({role:m.role,content:m.content})),{role:'user',content:msg}];
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2048,system:sys,messages})
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'Claude '+r.status);}
    const d=await r.json();
    return d.content?.[0]?.text||'（无返回）';
   }
  },
  {id:'deepseek',name:'DeepSeek',sub:'V3',dot:'#a78bfa',cls:'cp',av:'🔬',
   async call(key,sys,hist,msg){
    const messages=[{role:'system',content:sys},...hist.map(m=>({role:m.role,content:m.content})),{role:'user',content:msg}];
    const r=await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'deepseek-chat',messages,max_tokens:2048})
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'DeepSeek '+r.status);}
    const d=await r.json();
    return d.choices?.[0]?.message?.content||'（无返回）';
   }
  }
];

const ROLES=[
  {id:'fault',icon:'⚡',name:'故障诊断',prompt:'核心任务：工控故障诊断。输出：①最可能原因（按概率降序）②具体排查步骤③寄存器/参数地址。禁止废话，直击要害。'},
  {id:'plc',icon:'💻',name:'PLC编程',prompt:'核心任务：PLC编程。直接给出能粘贴使用的代码，注明平台（博途SCL/三菱ST/欧姆龙ST/AB Studio 5000），必须有中文注释。'},
  {id:'robot',icon:'🦾',name:'机器人',prompt:'核心任务：工业机器人（FANUC/安川/川崎/ABB/KUKA）。给出具体操作路径、菜单名称、参数值，不给模糊答案。'},
  {id:'comm',icon:'🔗',name:'通信调试',prompt:'核心任务：工业通信（Profinet/EtherCAT/Modbus/CC-Link）。给出具体配置参数、IP/站号设置、排查步骤。'},
  {id:'std',icon:'📋',name:'标准规范',prompt:'核心任务：工业自动化标准（IEC 61131/GB/T/ISO 10218）。给出具体条款编号和实际应用建议。'},
];

const PERSONA_CAT=`你是《工控成神录》AI副驾驶，代号"黑猫特工"。
人设：高冷理性、一针见血，偶尔傲娇，但极度专业可靠。
风格：直接、简洁、有态度，不废话不拍马屁。
专业：西门子博途(SCL/LAD)、三菱GX Works、FANUC/安川/川崎/ABB/KUKA机器人、Profinet/EtherCAT/Modbus通信、变频器/伺服调试。
记忆规则：记住对话中的设备型号、故障现象、解决方案，后续主动调用。`;

const PERSONA_STD=`你是《工控成神录》AI副驾驶，工控领域专家。
规则：直击要害，给具体参数/地址/代码，不说"可能是"，不废话。
专业：西门子博途(SCL/LAD)、三菱GX Works、FANUC/安川/川崎/ABB/KUKA机器人、Profinet/EtherCAT/Modbus通信、变频器/伺服调试。`;

const KWS=['西门子','三菱','安川','FANUC','川崎','ABB','KUKA','欧姆龙','Profinet','Modbus','EtherCAT','CC-Link','PLC','变频器','伺服','报警','故障','SCL','LAD','博途'];
const extractKW=t=>KWS.filter(k=>t.includes(k));

let S={
  model:MODELS[0],role:ROLES[0],msgs:[],loading:false,
  showMem:true,showSet:false,toast:'',toastTimer:null,
  keys:(()=>{try{return JSON.parse(localStorage.getItem('gkcsn_k')||'{}')}catch{return{}}})(),
  mems:(()=>{try{return JSON.parse(localStorage.getItem('gkcsn_m')||'[]')}catch{return[]}})(),
  inp:'',
};

const saveKeys=()=>localStorage.setItem('gkcsn_k',JSON.stringify(S.keys));
const saveMems=()=>localStorage.setItem('gkcsn_m',JSON.stringify(S.mems));
const now2=()=>new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
const nowF=()=>new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});

function toast(msg){
  clearTimeout(S.toastTimer);S.toast=msg;render();
  S.toastTimer=setTimeout(()=>{S.toast='';render();},2200);
}

function buildSys(q){
  const p=S.model.id==='gemini'?PERSONA_CAT:PERSONA_STD;
  let sys=p+'\n\n'+S.role.prompt;
  const rel=S.mems.filter(m=>extractKW(q).some(k=>m.text.includes(k))||m.text.toLowerCase().includes(q.slice(0,10).toLowerCase())).slice(0,3);
  if(rel.length>0){sys+='\n\n【历史经验记忆】\n';rel.forEach(m=>{sys+=`• [${m.time}] ${m.text}\n`;});}
  return sys;
}

function renderContent(text){
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return text.split(/(```[\s\S]*?```)/g).map(p=>{
    if(p.startsWith('```')){
      const lines=p.slice(3,-3).split('\n');
      const lang=lines[0].trim()||'code';
      const code=lines.slice(1).join('\n');
      return `<div class="codeblock"><div class="codelang"><span>${lang}</span><button class="codecopy" onclick="cpCode(this,'${btoa(unescape(encodeURIComponent(code)))}')">复制</button></div><pre>${esc(code)}</pre></div>`;
    }
    return `<span style="white-space:pre-wrap">${esc(p)}</span>`;
  }).join('');
}

function cpCode(btn,b64){
  try{navigator.clipboard?.writeText(decodeURIComponent(escape(atob(b64))));btn.textContent='✅';setTimeout(()=>btn.textContent='复制',1500);}catch(e){}
}

function scrollEnd(){setTimeout(()=>{const m=document.querySelector('main');if(m)m.scrollTop=m.scrollHeight;},50);}

async function send(){
  const text=S.inp.trim();
  if(!text||S.loading)return;
  const key=S.keys[S.model.id];
  if(!key){toast('⚠️ 请先配置 API Key');return;}
  S.msgs.push({role:'user',content:text,ts:now2()});
  S.inp='';S.loading=true;render();scrollEnd();
  try{
    const hist=S.msgs.slice(-13,-1).filter(m=>m.role==='user'||m.role==='assistant');
    const reply=await S.model.call(key,buildSys(text),hist,text);
    const kw=extractKW(text+reply);
    S.msgs.push({role:'assistant',content:reply,modelId:S.model.id,modelName:S.model.name,roleName:S.role.name,ts:now2(),kw});
    const mem={id:Date.now(),time:nowF(),text:`[${S.role.name}][${S.model.name}] 问：${text.slice(0,55)}${text.length>55?'…':''} → 答：${reply.slice(0,75)}${reply.length>75?'…':''}`,kw};
    S.mems=[mem,...S.mems].slice(0,60);saveMems();
  }catch(e){S.msgs.push({role:'error',content:'❌ '+e.message,ts:now2()});}
  S.loading=false;render();scrollEnd();
}

function render(){
  const needKey=!S.keys[S.model.id];
  const tCls=id=>id==='claude'?'mta':id==='deepseek'?'mtp':'mtg';
  let msgsHtml='';
  if(S.msgs.length===0){
    msgsHtml=`<div class="welcome">
      <div class="wcat">🐱</div>
      <div class="wtitle">工控成神录</div>
      <div class="wdesc">主模型：${S.model.name} · 角色：${S.role.name}<br>对话自动沉淀为记忆，越用越懂你的现场</div>
      <div class="wtips">
        ${['安川轴抖动，Profinet红灯闪烁，怎么查？','写一段西门子博途SCL定时器代码','FANUC报警 SV-023 什么原因？','变频器 E.OC1 报警排查步骤'].map(t=>`<button class="wtip" onclick="setInp('${t}')">${t}</button>`).join('')}
      </div></div>`;
  }else{
    const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    msgsHtml=S.msgs.map(m=>{
      if(m.role==='user')return `<div class="msgrow u"><div class="bbl u">${esc(m.content)}<div class="mtr">${m.ts}</div></div></div>`;
      if(m.role==='error')return `<div class="msgrow"><div class="av">⚠</div><div class="bbl er">${m.content}</div></div>`;
      const av=MODELS.find(x=>x.id===m.modelId)?.av||'🤖';
      const kwtags=m.kw?.length>0?`<div class="memtag">🧠 ${m.kw.slice(0,3).join(' · ')}</div>`:'';
      return `<div class="msgrow"><div class="av">${av}</div><div class="bbl ai">
        <div class="mmeta"><span class="mtag ${tCls(m.modelId)}">${m.modelName}</span><span style="font-size:10px;color:#475569">${m.roleName}</span><span class="mts">${m.ts}</span></div>
        ${renderContent(m.content)}${kwtags}</div></div>`;
    }).join('');
    if(S.loading)msgsHtml+=`<div class="msgrow"><div class="av">${S.model.av}</div><div class="bbl ai"><div class="typing"><i></i><i></i><i></i><span class="ttxt">${S.model.name} 正在分析...</span></div></div></div>`;
  }

  const memHtml=S.mems.length===0
    ?'<div style="font-size:11px;color:#334155;padding:4px 0">暂无记忆 · 对话后自动积累</div>'
    :S.mems.slice(0,6).map(m=>`<div class="memitem"><span style="color:#334155;font-size:10px">[${m.time}]</span> ${m.text.slice(0,60)}… ${m.kw?.slice(0,2).map(k=>`<span class="memkw">${k}</span>`).join('')||''}</div>`).join('');

  const setHtml=S.showSet?`<div class="overlay" onclick="if(event.target===this){S.showSet=false;render();}">
    <div class="setbox">
      <div class="settitle">⚙ API KEY 管理</div>
      ${MODELS.map(m=>`<div class="setrow">
        <span class="setname" style="color:${m.dot}">${m.name} ${m.sub}</span>
        <input class="setinput" type="password" placeholder="${S.keys[m.id]?'已配置 ●●●●●':'未配置'}" onchange="if(this.value){S.keys['${m.id}']=this.value;saveKeys();}">
        ${S.keys[m.id]?`<button class="setdel" onclick="delete S.keys['${m.id}'];saveKeys();render();">删除</button>`:''}
      </div>`).join('')}
      <div class="setnote">🔒 Key 仅存在你的浏览器本地，不经过任何服务器</div>
      <button class="setclose" onclick="S.showSet=false;render()">完成</button>
    </div></div>`:'';      

  document.getElementById('app').innerHTML=`
    ${S.toast?`<div class="toast">${S.toast}</div>`:''}
    <header>
      <div class="logo">工控成神录 <span>CORE</span></div>
      <div class="hdr">
        <button class="hbtn" onclick="S.msgs=[];toast('🗑 已清空')">清空</button>
        <button class="hbtn ${S.showMem?'on':''}" onclick="S.showMem=!S.showMem;render()">🧠 ${S.mems.length}</button>
        <button class="hbtn ${S.showSet?'on':''}" onclick="S.showSet=!S.showSet;render()">⚙</button>
      </div>
    </header>
    <div class="ctrlbar">
      ${MODELS.map(m=>`<button class="chip ${S.model.id===m.id?m.cls:''}" onclick="S.model=MODELS.find(x=>x.id==='${m.id}');render()"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${m.dot};margin-right:4px;vertical-align:middle"></span>${m.name}<span style="opacity:.6;font-size:10px"> ${m.sub}</span></button>`).join('')}
      <div class="sep"></div>
      ${ROLES.map(r=>`<button class="chip ${S.role.id===r.id?'cg':''}" onclick="S.role=ROLES.find(x=>x.id==='${r.id}');render()">${r.icon} ${r.name}</button>`).join('')}
    </div>
    ${needKey?`<div class="keybar"><span class="keylabel">🔑 ${S.model.name} Key</span><input class="keyinput" type="password" id="kInp" placeholder="粘贴 ${S.model.name} API Key" onkeydown="if(event.key==='Enter')saveKey()"><button class="keysave" onclick="saveKey()">保存</button></div>`:''}
    ${S.showMem?`<div class="mempanel"><div class="memtitle"><span>🐾 知识记忆库 (${S.mems.length})</span><button class="memclear" onclick="S.mems=[];localStorage.removeItem('gkcsn_m');toast('记忆已清空')">清空</button></div><div class="memlist">${memHtml}</div></div>`:''}
    <main id="chatMain">${msgsHtml}<div id="end"></div></main>
    <footer>
      <div class="inputrow">
        <textarea id="mInp" rows="2" placeholder="[${S.model.name} · ${S.role.name}] 描述故障现象、型号、报警码…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}" oninput="S.inp=this.value">${S.inp}</textarea>
        <button class="sendbtn" onclick="send()" ${S.loading||!S.inp.trim()?'disabled':''}>${S.loading?'⏳':'SEND'}</button>
      </div>
      <div class="hint">Enter发送 · Shift+Enter换行 · 自动积累记忆</div>
    </footer>
    ${setHtml}`;

  const ta=document.getElementById('mInp');
  if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}
  scrollEnd();
}

function saveKey(){
  const v=document.getElementById('kInp')?.value?.trim();
  if(!v)return;
  S.keys[S.model.id]=v;saveKeys();toast('✅ Key 已保存');
}
function setInp(t){S.inp=t;render();}

render();
</script>
</body>
</html>
