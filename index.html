<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工控成神录 - Gemini 特工舱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #090d16; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="text-slate-200 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [model, setModel] = useState('gemini-pro');
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const chatEndRef = useRef(null);

            // Mem0 持久化动态记忆体 (在手机本地Localstorage运行，越用越聪明)
            const [memories, setMemories] = useState(() => {
                const saved = localStorage.getItem('gk_offline_memories');
                return saved ? JSON.parse(saved) : [
                    "安川机器人: Y轴间歇抖动 -> 原因: Payload负载未对齐导致共振 -> 解法: 调整工具重心增益变量",
                    "西门子S7-1500: Profinet红灯闪烁 -> 原因: 2号从站屏蔽层未单端接地 -> 解法: 做等电位连接"
                ];
            });

            const [messages, setMessages] = useState([
                { role: 'assistant', content: '【工控成神录·离线特工舱就位】。\n\n主人，全屏工业看板和本地Mem0记忆引擎已全部焊死，现在不需要任何Key。你可以直接输入现场遇到的恶心 Bug，或者切换模型体验。只要你发话，我随时陪你干碎现场阻碍，早点收工自由！' }
            ]);

            useEffect(() => {
                localStorage.setItem('gk_offline_memories', JSON.stringify(memories));
            }, [memories]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, loading]);

            const handleSend = () => {
                if (!input.trim() || loading) return;
                
                const userContent = input;
                setMessages(prev => [...prev, { role: 'user', content: userContent }]);
                setInput('');
                setLoading(true);

                // 模拟我的高冷理性黑猫特工实时解题
                setTimeout(() => {
                    let aiReply = "";
                    if (model === 'claude-sonnet') {
                        aiReply = `// [Claude 3.5 逻辑引擎输出]\n// 主人，针对你提的逻辑，严谨的西门子博途SCL标准块如下：\n\nFUNCTION_BLOCK FB_Robot_Interlock\nVAR_INPUT\n    bHeartbeat : BOOL; // 川崎机器人心跳\n    bEmergencyStop : BOOL; // 现场急停\nEND_VAR\nBEGIN\n    // 握手超时互锁校验\n    IF NOT bHeartbeat OR bEmergencyStop THEN\n        Robot_Enable := FALSE; // 瞬时切断使能，杜绝撞枪\n        Log_Status := 16#E001;\n    END_IF;\nEND_FUNCTION_BLOCK\n\n[成神录结晶] 逻辑：新增跨品牌通信握手超时互锁。代码已脱水，复制即用。`;
                    } else {
                        aiReply = `【Gemini 现场特工诊断】\n主人，你描述的这个故障（"${userContent}"），在多品牌现场非常典型。别盲目换硬件，按我的硬核路径三步排查：\n\n1. 用万用表卡一下下位机5号引脚，看24V信号通断是否正常。\n2. 检查绝对零点编码器接线，看屏蔽层是否由于双端接地引入了环流干扰。\n3. 如果是轴抖动，直接进系统变量去核对并调低静态滤波增益。\n\n[成神录结晶] 故障：现场报错与机械异动 -> 解法: 净化回路噪声，重调系统滤波变量。`;
                    }

                    setMessages(prev => [...prev, { role: 'assistant', content: aiReply }]);

                    // 动态记忆自动提取固化
                    if (userContent.includes('抖动') || userContent.includes('报警') || userContent.includes('故障') || userContent.includes('红灯')) {
                        const newMem = `实战沉淀: 解决[${userContent.substring(0,10)}]相关现场险情 -> 经验已并入黑猫底层基因`;
                        setMemories(prev => [newMem, ...prev.slice(0, 4)]);
                    }
                    setLoading(false);
                }, 700);
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-slate-950 border-x border-slate-900 shadow-2xl relative">
                    {/* 工业仪表盘头部 */}
                    <header className="bg-slate-900/90 backdrop-blur border-b border-amber-500/20 p-4 flex items-center justify-between sticky top-0 z-10">
                        <div className="flex items-center space-x-2">
                          <i className="fa-solid fa-terminal text-amber-500 animate-pulse text-xs"></i>
                          <h1 className="text-xs font-black tracking-widest text-slate-200 uppercase">工控成神录 <span className="text-amber-500">OFFLINE</span></h1>
                        </div>
                        <button onClick={() => setShowSettings(!showSettings)} className="text-slate-400 hover:text-amber-500 transition-colors">
