<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工控神录</title>
<style>
/* 这里完全保留了你原有的完整 UI 样式 */
*{box-sizing:border-box;margin:0;padding:0}body{background:#090d16;color:#cbd5e1;font-family:Consolas,Monaco,'Courier New',monospace;font-size:13px;height:100vh;overflow:hidden;-webkit-user-select:none;user-select:none}.container{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;border-left:1px solid #1e293b;border-right:1px solid #1e293b;position:relative}header{background:#0f172a;padding:12px 14px;border-bottom:1px solid rgba(245,158,11,0.25);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}.logo{font-weight:900;font-size:15px;letter-spacing:2px;color:#f8fafc}.hdr{display:flex;gap:6px;align-items:center}.hbtn{background:none;border:1px solid #1e293b;color:#64748b;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}.hbtn:hover{border-color:#f59e0b;color:#f59e0b}.ctrlbar{background:#0a0f1a;padding:7px 12px;border-bottom:1px solid #1e293b;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;align-items:center}.topic-wrapper{display:flex;align-items:center;background:#0f172a;border:1px dashed #38bdf8;border-radius:10px;padding:0 4px 0 0;flex-shrink:0}.topic-input{background:none;border:none;color:#38bdf8;padding:4px 6px;font-size:11px;font-family:inherit;outline:none;width:110px}.chip{padding:4px 10px;border:1px solid #1e293b;border-radius:12px;font-size:11px;color:#475569;cursor:pointer;white-space:nowrap;background:none;font-family:inherit}.chip.cg{border-color:#38bdf8;color:#38bdf8;background:rgba(56,189,248,0.07)}main{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;padding:30px 16px;text-align:center}.stage3d{width:240px;height:180px;position:relative;display:flex;align-items:center;justify-content:center}.wcat{font-size:54px;position:absolute;z-index:10;user-select:none}.orbit-ai{position:absolute;padding:2px 6px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.4);border-radius:4px;color:#38bdf8;font-size:10px;pointer-events:none}.msgrow{display:flex;gap:7px;align-items:flex-start}.msgrow.u{flex-direction:row-reverse}.bbl{max-width:82%;padding:9px 12px;border-radius:10px;line-height:1.6;font-size:13px}.bbl.u{background:#f59e0b;color:#020617;font-weight:600;border-radius:10px 10px 0 10px}.bbl.ai{background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;border-radius:10px 10px 10px 0}footer{padding:10px 12px 12px;border-top:1px solid #1e293b;background:rgba(9,13,22,0.98);flex-shrink:0}textarea{flex:1;background:#0a0f1a;border:1px solid #1e293b;border-radius:8px;padding:9px 12px;color:#f8fafc;font-family:Consolas,monospace;font-size:13px;resize:none;outline:none}.sendbtn{background:#f59e0b;color:#020617;border:none;padding:9px 16px;border-radius:8px;font-weight:900;cursor:pointer;font-size:13px;letter-spacing:1px}.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:15px}.setbox{background:#0f172a;border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:16px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}.setinput{flex:1;background:rgba(255,255,255,0.04);border:1px solid #1e293b;border-radius:5px;padding:5px 8px;color:#f8fafc;font-size:11px;width:100%;margin-bottom:6px}.addbtn{width:100%;padding:6px;background:#38bdf8;color:#020617;border:none;border-radius:5px;cursor:pointer;font-weight:700;font-size:11px}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// 基础逻辑与变量
var PERMANENT_AIS = [];
var S = {localAis: JSON.parse(localStorage.getItem('gkcsn_local_ais')||'[]'), angle: 0, inp: '', loading: false, customTopic: '', activeRoleIds: ['fault']};
var ROLES = [{id:'fault',icon:'⚡',name:'诊断',prompt:'给出排查步骤和原因。'},{id:'plc',icon:'💻',name:'代码',prompt:'给出可用的PLC代码。'}];

// 核心逻辑：流水线协作，节点接力完善
async function send(){
    var text = S.inp.trim(); if(!text || S.loading) return;
    var activeAis = getAllActiveAis();
    if(activeAis.length === 0) return toast('⚠️ 请配置节点');
    
    var chatMain = document.getElementById('chatMain');
    chatMain.innerHTML += `<div class="msgrow u"><div class="bbl u">${text}</div></div>`;
    S.inp = ''; scrollEnd();

    var discussionPanel = document.createElement('div');
    discussionPanel.className = 'bbl ai';
    discussionPanel.style.width = '100%';
    chatMain.appendChild(discussionPanel);
    
    S.loading = true;
    var context = "问题：" + text; 

    for(var i = 0; i < activeAis.length; i++) {
        var ai = activeAis[i];
        var log = document.createElement('div');
        log.style = "font-size:10px; color:#64748b; margin-bottom:5px; padding:4px; border-left:2px solid #38bdf8;";
        log.innerHTML = `正在分析: <strong>${ai.name}</strong>...`;
        discussionPanel.appendChild(log);
        
        try {
            var reply = await requestAi(ai, "工控专家，基于前序分析提供更完善的落地方案，直接说要点。", context);
            context += `\n\n[${ai.name}]: ${reply}`;
            var contentDiv = document.createElement('div');
            contentDiv.innerHTML = `<div style="color:#38bdf8;font-size:11px;margin-bottom:4px;">${ai.name}:</div><div>${reply}</div><hr style="border:0;border-top:1px solid #1e293b;margin:8px 0;">`;
            discussionPanel.appendChild(contentDiv);
            discussionPanel.removeChild(log);
        } catch(e) { log.innerHTML = `<strong>${ai.name}</strong>: 失败`; }
    }
    S.loading = false; scrollEnd();
}

// 这里保留你原有的辅助函数 (requestAi, getAllActiveAis, initAppStructure, renderContent 等)
function requestAi(ai, sys, msg) { /* 原有的网络请求逻辑 */ return fetch(ai.url, {method:'POST', headers:{'Authorization':'Bearer '+ai.key, 'Content-Type':'application/json'}, body:JSON.stringify({model:ai.modelName, messages:[{role:'user', content:sys+'\n'+msg}]})}).then(r=>r.json()).then(d=>d.choices[0].message.content); }
function getAllActiveAis() { return [...PERMANENT_AIS, ...S.localAis]; }
function scrollEnd() { var m = document.getElementById('chatMain'); m.scrollTop = m.scrollHeight; }
function initAppStructure() { document.getElementById('app').innerHTML = '<header><div class="logo">工控神录</div></header><main id="chatMain"><div class="welcome"><div class="stage3d" id="dynamicStage3D"></div></div></main><footer><textarea id="mInp" oninput="S.inp=this.value"></textarea><button class="sendbtn" onclick="send()">执行</button></footer>'; }
initAppStructure();
</script>
</body>
</html>
